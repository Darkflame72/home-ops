# No yaml-language-server schema available: argoproj/argo-rollouts (no values.schema.json)
controller:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

dashboard:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 48Mi
    limits:
      memory: 192Mi
  httproute:
    enabled: true
    parentRefs:
      - name: envoy-internal
        namespace: network
        sectionName: https
    hostnames:
      - rollouts.darkflame.dev
