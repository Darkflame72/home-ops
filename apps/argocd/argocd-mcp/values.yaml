---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  argocd-mcp:
    containers:
      app:
        image:
          repository: ghcr.io/argoproj-labs/mcp-for-argocd
          tag: v0.8.0
        command: ["node", "dist/index.js"]
        args: ["http", "--stateless", "--port", "3001"]
        env:
          ARGOCD_BASE_URL: "http://argocd-server.argocd.svc.cluster.local"
          ARGOCD_API_TOKEN:
            valueFrom:
              secretKeyRef:
                name: argocd-mcp-secret
                key: api_token
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 3001
              initialDelaySeconds: 5
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 3001
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
service:
  app:
    annotations:
      agentgateway.dev/mcp-path: /mcp
    ports:
      http:
        port: 3001
        appProtocol: agentgateway.dev/mcp
