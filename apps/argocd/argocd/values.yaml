# No yaml-language-server schema available: argoproj/argo-helm
global:
  domain: cd.darkflame.dev

redis-ha:
  enabled: true

controller:
  replicas: 1

configs:
  params:
    # It isn't actually insecure as the gateway handles TLS termination
    server.insecure: true
  cm:
    statusbadge.enabled: "true"
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
        - .spec.refreshInterval
        - .spec.target.creationPolicy
        - .spec.target.deletionPolicy
        - '.spec.data[]?.remoteRef.nullBytePolicy'
    resource.customizations.ignoreDifferences.external-secrets.io_ClusterExternalSecret: |
      jqPathExpressions:
        - .spec.externalSecretSpec.refreshInterval
        - .spec.externalSecretSpec.target.creationPolicy
        - .spec.externalSecretSpec.target.deletionPolicy
        - '.spec.externalSecretSpec.data[]?.remoteRef.nullBytePolicy'
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
      jqPathExpressions:
        - '.spec.parentRefs[]?.group'
        - '.spec.parentRefs[]?.kind'
        - '.spec.rules[]?.backendRefs[]?.group'
        - '.spec.rules[]?.backendRefs[]?.kind'
        - '.spec.rules[]?.backendRefs[]?.namespace'
        - '.spec.rules[]?.backendRefs[]?.weight'
        - '.spec.rules[]?.matches[]?.path.type'
    resource.customizations.ignoreDifferences.apps_StatefulSet: |
      jqPathExpressions:
        - '.spec.volumeClaimTemplates[]?.apiVersion'
        - '.spec.volumeClaimTemplates[]?.kind'
        - '.spec.volumeClaimTemplates[]?.status'

server:
  httproute:
    enabled: true
    parentRefs:
      - name: envoy-internal
        namespace: network
    hostnames:
      - "cd.darkflame.dev"
    rules:
      - backendRefs:
          - name: argocd-server
            port: 80
        matches:
          - path:
              type: PathPrefix
              value: /

  autoscaling:
    enabled: true
    minReplicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

applicationSet:
  replicas: 2

notifications:
  enabled: true
  secret:
    create: false
    name: argocd-notifications-secret
  notifiers:
    service.github: |
      appID: $github-appId
      installationID: $github-installationId
      privateKey: $github-privateKey
  templates:
    template.github-commit-status: |
      github:
        repoURLPath: '{{if .app.spec.source}}{{.app.spec.source.repoURL}}{{else}}{{(index .app.spec.sources 0).repoURL}}{{end}}'
        revisionPath: '{{if .app.status.operationState.syncResult.revision}}{{.app.status.operationState.syncResult.revision}}{{else}}{{index .app.status.operationState.syncResult.revisions 0}}{{end}}'
        status:
          state: '{{if eq .app.status.operationState.phase "Succeeded"}}success{{else if eq .app.status.operationState.phase "Failed"}}failure{{else if eq .app.status.operationState.phase "Error"}}error{{else}}pending{{end}}'
          label: "continuous-delivery/{{.app.metadata.name}}"
          targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
        deployment:
          state: '{{if eq .app.status.operationState.phase "Succeeded"}}success{{else if eq .app.status.operationState.phase "Failed"}}failure{{else if eq .app.status.operationState.phase "Error"}}error{{else}}in_progress{{end}}'
          environment: "{{.app.metadata.name}}"
          environmentURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
          logURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
          requiredContexts: []
          autoMerge: false
          transientEnvironment: false
  triggers:
    trigger.on-sync-running: |
      - when: app.status.operationState.phase in ['Running']
        send: [github-commit-status]
    trigger.on-sync-succeeded: |
      - when: app.status.operationState.phase in ['Succeeded']
        send: [github-commit-status]
    trigger.on-sync-failed: |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [github-commit-status]
  subscriptions:
    - recipients:
        - github
      triggers:
        - on-sync-running
        - on-sync-succeeded
        - on-sync-failed
