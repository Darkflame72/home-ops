# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  mysql:
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: docker.io/library/mysql
          # renovate: datasource=docker depName=mysql
          tag: 8.0.44@sha256:9c3380eac945af0736031b200027f581925927c81e010056214a4bd6b6693714
        securityContext:
          runAsUser: 999
          runAsGroup: 999
          runAsNonRoot: true
        env:
          MYSQL_DATABASE: ghost
          MYSQL_USER: ghost
        envFrom:
          - secretRef:
              name: ghost-secret
        probes:
          liveness: &mysql-probe
            enabled: true
            custom: true
            spec:
              exec:
                command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$(MYSQL_ROOT_PASSWORD)"]
              initialDelaySeconds: 30
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 5
          readiness: *mysql-probe
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi

  ghost:
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      activitypub-migrate:
        image:
          repository: ghcr.io/tryghost/activitypub-migrations
          # renovate: datasource=docker depName=ghcr.io/tryghost/activitypub-migrations
          tag: 1.2.7@sha256:19724eca7b7669b01047c746738bf34c46dfa587e2be5b8641067d9ab707a7bb
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
        env:
          DB_HOST: ghost-mysql
          DB_PORT: "3306"
          DB_USER: ghost
          DB_NAME: activitypub
          DB_PASS:
            valueFrom:
              secretKeyRef:
                name: ghost-secret
                key: MYSQL_PASSWORD
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
    containers:
      app:
        image:
          repository: docker.io/library/ghost
          # renovate: datasource=docker depName=ghost
          tag: 6.53.0-alpine@sha256:63b12cb176ffe9cfe651b839c18f6c7261004370f566d9ae218cacd67766b2b1
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
        env:
          NODE_ENV: production
          url: https://blog.darkflame.dev
          database__client: mysql
          database__connection__host: ghost-mysql
          database__connection__user: ghost
          database__connection__database: ghost
          mail__transport: SMTP
          mail__options__host: smtp-relay.default.svc.cluster.local
          mail__options__port: 25
          mail__options__secure: false
          mail__from: blog@darkflame.dev
          database__connection__password:
            valueFrom:
              secretKeyRef:
                name: ghost-secret
                key: MYSQL_PASSWORD
        probes:
          liveness: &ghost-probe
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 2368
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
          readiness: *ghost-probe
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
      activitypub:
        image:
          repository: ghcr.io/tryghost/activitypub
          # renovate: datasource=docker depName=ghcr.io/tryghost/activitypub
          tag: 1.2.7@sha256:f677e8af8df41418c3bfd63b4ec76b9bf2bbd85bde7da0aa9ecd86e41a230835
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
        env:
          NODE_ENV: production
          MYSQL_HOST: ghost-mysql
          MYSQL_USER: ghost
          MYSQL_DATABASE: activitypub
          LOCAL_STORAGE_PATH: /opt/activitypub/content/images/activitypub
          LOCAL_STORAGE_HOSTING_URL: https://blog.darkflame.dev/content/images/activitypub
          MYSQL_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: ghost-secret
                key: MYSQL_PASSWORD
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  mysql:
    controller: mysql
    ports:
      mysql:
        port: 3306
  app:
    controller: ghost
    ports:
      http:
        port: 2368
  activitypub:
    controller: ghost
    ports:
      http:
        port: 8080

route:
  app:
    hostnames:
      - blog.darkflame.dev
    annotations:
      # The gatus-sidecar auto-discovers the first rule on the route, which
      # is the /.ghost/activitypub prefix (always 404 unauthenticated).
      # Force it back to a bare-host probe so it checks the main page.
      gatus.home-operations.com/endpoint: |-
        path: ""
    parentRefs:
      - name: envoy-external
        namespace: network
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /.ghost/activitypub
        backendRefs:
          - identifier: activitypub
            port: 8080
      - matches:
          - path:
              type: Exact
              value: /.well-known/webfinger
        backendRefs:
          - identifier: activitypub
            port: 8080
      - matches:
          - path:
              type: Exact
              value: /.well-known/nodeinfo
        backendRefs:
          - identifier: activitypub
            port: 8080
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: app
            port: 2368

configMaps:
  mysql-init:
    data:
      create-multiple-databases.sh: |-
        #!/bin/bash
        set -e
        set -u
        mysql -u root -p"$MYSQL_ROOT_PASSWORD" <<-EOSQL
          CREATE DATABASE IF NOT EXISTS \`activitypub\`;
          GRANT ALL ON \`activitypub\`.* TO '$MYSQL_USER'@'%';
        EOSQL

persistence:
  mysql-init:
    type: configMap
    identifier: mysql-init
    defaultMode: 0755
    advancedMounts:
      mysql:
        app:
          - path: /docker-entrypoint-initdb.d/create-multiple-databases.sh
            subPath: create-multiple-databases.sh
            readOnly: true
  mysql-data:
    existingClaim: ghost-mysql
    advancedMounts:
      mysql:
        app:
          - path: /var/lib/mysql
  content:
    existingClaim: ghost-content
    advancedMounts:
      ghost:
        app:
          - path: /var/lib/ghost/content
        activitypub:
          - path: /opt/activitypub/content
