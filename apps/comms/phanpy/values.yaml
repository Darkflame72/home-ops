---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  element:
    containers:
      app:
        image:
          repository: ghcr.io/yitsushi/phanpy-docker
          tag: 2025.11.26.ac85274@sha256:c6eff8b71b245bc5925eb1117d0b80cb03300679bd81043107c32efe1b2db0ed
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
service:
  app:
    ports:
      http:
        port: &port 80
serviceMonitor:
  app:
    endpoints:
      - port: http
route:
  app:
    hostnames:
      - phanpy.darkflame.dev
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - identifier: app
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /
