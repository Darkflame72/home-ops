apiVersion: apps/v1
kind: Deployment
metadata:
  name: anubis-forgejo
  namespace: default
spec:
  selector:
    matchLabels:
      app: anubis-forgejo
  template:
    metadata:
      labels:
        app: anubis-forgejo
    spec:
      containers:
        - name: anubis
          # renovate: datasource=docker depName=ghcr.io/techarohq/anubis
          image: ghcr.io/techarohq/anubis:v1.25.0@sha256:5cf4c0d6c7ea01a356c6685a779971bdd28d6a5a4a6719201f73a9c4ae108db0
          imagePullPolicy: IfNotPresent
          env:
            - name: "BIND"
              value: ":80"
            - name: "DIFFICULTY"
              value: "4"
            - name: ED25519_PRIVATE_KEY_HEX
              valueFrom:
                secretKeyRef:
                  name: forgejo-secret
                  key: anubis-key
            - name: "METRICS_BIND"
              value: ":9090"
            - name: "SERVE_ROBOTS_TXT"
              value: "true"
            - name: "TARGET"
              value: "http://forgejo-http.default.svc.cluster.local:3000"
            - name: "OG_PASSTHROUGH"
              value: "true"
            - name: "OG_EXPIRY_TIME"
              value: "24h"
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 250m
              memory: 128Mi
          securityContext:
            runAsUser: 912
            runAsGroup: 912
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: anubis-forgejo
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: anubis-forgejo
  ports:
  - port: 80
    targetPort: 80
    name: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  labels:
    home-operations.com/pihole: ignore
spec:
  hostnames:
    - git.darkflame.dev
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: anubis-forgejo
          namespace: default
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo-internal
  annotations:
    # git.darkflame.dev is also public (external route via anubis), so the
    # guarded DNS check inherited from envoy-internal would always fail, and
    # the sidecar can't opt a single route out of guarded mode (it only checks
    # key presence). A static HTTP endpoint that resolves via pihole to probe
    # this route is defined in apps/observability/gatus/config/config.yaml.
    gatus.home-operations.com/enabled: "false"
spec:
  hostnames:
    - git.darkflame.dev
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: forgejo-http
          namespace: default
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
