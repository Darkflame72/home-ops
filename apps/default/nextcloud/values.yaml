image:
  registry: docker.io
  repository: library/nextcloud
  flavor: apache
  # renovate: datasource=docker depName=nextcloud
  tag: 34.0.2-apache@sha256:e93ccfc952c95f18175f3d297fb2f60c35070c05ca976050c250a9ddab793e75

replicaCount: 1

phpClientHttpsFix:
  enabled: true
  protocol: https

httpRoute:
  enabled: true
  hostnames:
    - cloud.darkflame.dev
  parentRefs:
    - name: envoy-external
      namespace: network
  annotations:
    # The gatus-sidecar auto-discovers the first rule on the route, which is
    # the /.well-known/carddav redirect to WebDAV. Force it back to a
    # bare-host probe so it checks the main page (redirects to /login, 200)
    # instead.
    gatus.home-operations.com/endpoint: |-
      path: ""

service:
  port: 80

nextcloud:
  host: cloud.darkflame.dev
  containerPort: 80
  datadir: /var/www/html/data
  existingSecret:
    enabled: true
    secretName: nextcloud-secret
  extraEnv:
    - name: TRUSTED_PROXIES
      value: "10.42.0.0/16 10.43.0.0/16"
    - name: OVERWRITECLIURL
      value: "https://cloud.darkflame.dev"
    - name: OVERWRITEHOST
      value: "cloud.darkflame.dev"
  strategy:
    type: Recreate
  configs:
    hide-login-form.config.php: |-
      <?php
      $CONFIG = array (
        'hide_login_form' => true,
      );
    maintenance-window.config.php: |-
      <?php
      $CONFIG = array (
        'maintenance_window_start' => 2,
      );

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql
  existingSecret:
    enabled: true
    secretName: nextcloud-postgres-app
    usernameKey: user
    passwordKey: password
    hostKey: host
    databaseKey: dbname

externalRedis:
  enabled: true
  host: nextcloud-redis.default.svc.cluster.local
  port: "6379"

cronjob:
  enabled: true
  type: cronjob
  cronjob:
    schedule: "*/5 * * * *"
    affinity:
      podAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - nextcloud
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - app
            topologyKey: kubernetes.io/hostname
    securityContext:
      runAsUser: 33
      runAsGroup: 33
      runAsNonRoot: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi

persistence:
  enabled: true
  existingClaim: nextcloud-app
  nextcloudData:
    enabled: true
    existingClaim: nextcloud-nfs

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 2Gi

prometheus:
  serviceMonitor:
    enabled: true
