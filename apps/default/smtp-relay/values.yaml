---
controllers:
  smtp-relay:
    replicas: 2
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/foxcpp/maddy
          tag: 0.9.3@sha256:2ce7ce6343816c8c96056776dd06660987d97ada96d31163cdd968d62e496a12
        env:
          SMTP_RELAY_SMTP_PORT: &port 25
        envFrom:
          - secretRef:
              name: "smtp-relay-secret"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 64Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
service:
  app:
    type: LoadBalancer
    ports:
      smtp:
        port: *port
configMaps:
  config:
    data:
      maddy.conf: |-
        state_dir /cache/state
        runtime_dir /cache/run
        tls off
        hostname smtp-relay.default.svc.cluster.local
        smtp tcp://0.0.0.0:{env:SMTP_RELAY_SMTP_PORT} {
            default_source {
                deliver_to &remote_queue
            }
        }
        target.queue remote_queue {
            target &remote_smtp
        }
        target.smtp remote_smtp {
            starttls no
            require_tls no
            auth plain {env:SMTP_RELAY_USERNAME} {env:SMTP_RELAY_PASSWORD}
            targets tls://{env:SMTP_RELAY_SERVER}:465
        }
persistence:
  cache:
    type: emptyDir
  config-file:
    type: configMap
    identifier: config
    globalMounts:
      - path: /data/maddy.conf
        subPath: maddy.conf
