---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-runner
    spec:
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.7.3
          securityContext:
            privileged: true
            runAsUser: 0
          command:
            - "sh"
            - "-c"
            - |
              while [ ! -S /var/run/docker.sock ]; do
                echo 'waiting for docker daemon...';
                sleep 5;
              done
              /bin/forgejo-runner --config /etc/runner/config.yaml daemon
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: runner-configfile
              mountPath: /etc/runner
            - name: docker-sock
              mountPath: /var/run
        - name: dind
          image: docker:29.3.1-dind
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run
      volumes:
        - name: docker-sock
          emptyDir: {}
        - name: runner-configfile
          secret:
            secretName: forgejo-runner-configfile
