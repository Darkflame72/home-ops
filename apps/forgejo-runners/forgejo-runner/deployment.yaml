---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-runner
    spec:
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.7.3@sha256:48b0539854bfc769fbf629725e089e35cfa1227ddedc7e45436b83bb9502ae27
          securityContext:
            # Stays root (runAsUser: 0): the image has no non-root user, and
            # it needs to reach the dind sidecar's docker.sock, which is
            # root:docker owned. No longer privileged though — it doesn't
            # need host device access, only the dind container does. See
            # the forgejo-runner-dind-privileged PolicyException.
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - "sh"
            - "-c"
            - |
              while [ ! -S /var/run/docker.sock ]; do
                echo 'waiting for docker daemon...';
                sleep 5;
              done
              /bin/forgejo-runner --config /etc/runner/config.yaml daemon
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: runner-configfile
              mountPath: /etc/runner
            - name: docker-sock
              mountPath: /var/run
        - name: dind
          image: docker:29.3.1-dind@sha256:686d2c5464787b0ca42420e0aa03a94fc9781ff9bf8b5ff947614b9fa4c3c3e0
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run
      volumes:
        - name: docker-sock
          emptyDir: {}
        - name: runner-configfile
          secret:
            secretName: forgejo-runner-configfile
