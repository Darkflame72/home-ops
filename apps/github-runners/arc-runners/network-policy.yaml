---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
#
# The pods here run PR-supplied Actions workflow steps (see the pwn-request
# note in .github/workflows/argocd-diff.yaml), so a compromised job must not
# be able to reach anything else in the cluster. The AutoscalingListener and
# controller both live in arc-system and manage these pods purely through
# the Kubernetes API/RBAC (see the arc-home-ops-gha-rs-manager Role bound to
# arc-system's ServiceAccount) — there's no network path *into* this
# namespace, so ingress is denied outright except kubelet health probes.
# Egress is limited to DNS, the argocd-diff workflow's ArgoCD call, and the
# public internet (GitHub API, actions/checkout, container registries).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arc-runners-default-deny
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: argocd
            app.kubernetes.io/name: argocd-server
      # Cilium enforces toPorts against the post-DNAT destination port, i.e.
      # the container's actual targetPort (8080), not the Service's port 80
      # that the workflow's ARGOCD_SERVER env var uses to reach it.
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
