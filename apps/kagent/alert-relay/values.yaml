---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  alert-relay:
    containers:
      app:
        image:
          repository: ghcr.io/darkflame72/alert-relay
          tag: latest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          KAGENT_BASE_URL: "http://kagent-controller.kagent.svc.cluster.local:8083"
          KAGENT_NAMESPACE: kagent
          KAGENT_AGENT: sre-agent
          STATE_NAMESPACE: kagent
          STATE_CONFIGMAP_NAME: alert-relay-state
          ACK_BASE_URL: "https://alert-relay.darkflame.dev"
          DISCORD_WEBHOOK_URL:
            valueFrom:
              secretKeyRef:
                name: alert-relay-discord
                key: webhook_url
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
service:
  app:
    ports:
      http:
        port: 8080
route:
  app:
    annotations:
      # This route only exists so Discord "mark as reviewed" links are clickable
      # externally; the service itself is primarily internal (Alertmanager calls
      # the ClusterIP directly) and only exposes /ack/{token}, not a checkable
      # root path. Gatus checks it instead via the internal service in
      # apps/observability/gatus/config/config.yaml.
      gatus.home-operations.com/enabled: "false"
    hostnames:
      - alert-relay.darkflame.dev
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: envoy-external
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - name: alert-relay
            port: 8080
        matches:
          - path:
              type: PathPrefix
              value: /ack
rbac:
  roles:
    alert-relay:
      type: Role
      rules:
        - apiGroups: [""]
          resources: ["configmaps"]
          verbs: ["create"]
        - apiGroups: [""]
          resources: ["configmaps"]
          resourceNames: ["alert-relay-state"]
          verbs: ["get", "update"]
  bindings:
    alert-relay:
      type: RoleBinding
      roleRef:
        identifier: alert-relay
      subjects:
        - identifier: alert-relay
serviceAccount:
  alert-relay: {}
