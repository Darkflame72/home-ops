# No yaml-language-server schema available: kagent-dev/kagent
fullnameOverride: kagent

providers:
  default: ollama
  ollama:
    provider: Ollama
    model: "qwen2.5:7b-instruct"
    config:
      host: ollama.kagent.svc.cluster.local:11434
      options:
        num_ctx: "8192"

kmcp:
  enabled: false

k8s-agent:
  enabled: true

cilium-manager-agent:
  enabled: true

cilium-debug-agent:
  enabled: true

helm-agent:
  enabled: true

istio-agent:
  enabled: false

kgateway-agent:
  enabled: false

argo-rollouts-agent:
  enabled: false

ui:
  # ui.httpRoute is a no-op on chart 0.9.11 (Gateway API support landed after
  # this release) -- see apps/kagent/kagent/httproute.yaml for the real route.
  externalUrl: https://kagent.darkflame.dev
