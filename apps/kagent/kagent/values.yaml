# No yaml-language-server schema available: kagent-dev/kagent
fullnameOverride: kagent

providers:
  default: ollama
  ollama:
    provider: Ollama
    model: "qwen2.5:7b-instruct"
    config:
      host: ollama.kagent.svc.cluster.local:11434
      options:
        num_ctx: "8192"

kmcp:
  enabled: false

k8s-agent:
  enabled: true

cilium-manager-agent:
  enabled: true

cilium-debug-agent:
  enabled: true

helm-agent:
  enabled: true

istio-agent:
  enabled: false

kgateway-agent:
  enabled: false

argo-rollouts-agent:
  enabled: false

ui:
  httpRoute:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: envoy-external
        namespace: network
        sectionName: https
    hostnames:
      - kagent.darkflame.dev
  externalUrl: https://kagent.darkflame.dev
