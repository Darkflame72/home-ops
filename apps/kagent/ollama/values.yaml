---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  ollama:
    type: statefulset
    containers:
      app:
        image:
          repository: ollama/ollama
          tag: "0.32.0@sha256:57f573b47f1f71ebb445789f279fe3e596a8beab182f7cf486db9205bad87c5a"
        command: ["sh", "-c"]
        args:
          - |
            ollama serve &
            until ollama list >/dev/null 2>&1; do sleep 1; done
            ollama pull qwen2.5:7b-instruct
            wait
        env:
          OLLAMA_MODELS: /data
          OLLAMA_HOST: "0.0.0.0:11434"
          OLLAMA_KEEP_ALIVE: 30m
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["sh", "-c", "ollama list | grep -q qwen2.5"]
              periodSeconds: 15
              failureThreshold: 120
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 11434
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 11434
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: "2"
            memory: 6Gi
          limits:
            memory: 10Gi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
service:
  app:
    ports:
      http:
        port: 11434
persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: ceph-block
    size: 20Gi
    globalMounts:
      - path: /data
