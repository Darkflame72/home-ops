---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: kopia-primary
spec:
  backend:
    s3:
      bucket: kopia
      endpoint: 10.0.60.15:30188
      region: garage
      tls:
        disableTls: true
      auth:
        secretRef:
          name: kopia-s3-secret
          namespace: kopiur-system
  encryption:
    passwordSecretRef:
      name: kopia-s3-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  allowedNamespaces:
    list:
      - comms
      - default
      - games
      - media
      - observability
      - security
  server:
    namespace: kopiur-system
    auth:
      generate: {}
    service:
      type: ClusterIP
      port: 51515
