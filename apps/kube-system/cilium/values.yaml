---
# renovate: datasource=github-releases depName=cilium/cilium
# yaml-language-server: $schema=https://raw.githubusercontent.com/cilium/cilium/v1.19.6/install/kubernetes/cilium/values.schema.json
autoDirectNodeRoutes: true
bpf:
  # Disabled: BPF masquerade doesn't handle the link-local SNAT address
  # Istio ambient uses for kubelet health probes, breaking health checks
  # for meshed pods. Falls back to Cilium's iptables masquerade path.
  masquerade: false
  # Ref: https://github.com/siderolabs/talos/issues/10002
  hostLegacyRouting: true
cni:
  # Required for pairing with Multus CNI
  exclusive: false
cgroup:
  automount:
    enabled: false
  hostRoot: /sys/fs/cgroup
# NOTE: devices might need to be set if you have more than one active NIC on your hosts
# devices: eno+ eth+
dashboards:
  enabled: true
  namespace: observability
endpointRoutes:
  enabled: true
envoy:
  rollOutPods: true
  prometheus:
     serviceMonitor:
       enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 80Mi
    limits:
      memory: 320Mi
gatewayAPI:
  enabled: true
hubble:
  enabled: false
ipam:
  mode: kubernetes
ipv4NativeRoutingCIDR: "10.42.0.0/16"
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
l2announcements:
  enabled: true
resources:
  requests:
    cpu: 100m
    memory: 240Mi
  limits:
    # Generous headroom: a cilium-agent OOMKill takes down host networking
    # (see k8s-2 UDP egress incident), so this is sized well above the
    # observed ~185Mi working set rather than tightly to it.
    memory: 2Gi
loadBalancer:
  algorithm: maglev
  mode: "dsr"
localRedirectPolicy: true
operator:
  dashboards:
    enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  replicas: 1
  rollOutPods: true
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      memory: 384Mi
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true
rollOutCiliumPods: true
routingMode: native
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - PERFMON
      - BPF
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
socketLB:
  hostNamespaceOnly: true
