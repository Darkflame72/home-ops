---
# Talos "Kubernetes Talos API access" ServiceAccount.
# Creates a Secret of the same name in this namespace containing a
# talosconfig scoped to the os:etcd:backup role, consumed by talos-backup.
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: etcd-backup
  namespace: kube-system
spec:
  roles:
    - os:etcd:backup
