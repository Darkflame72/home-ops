---
# No yaml-language-server schema available: kubernetes-sigs/metrics-server (no values.schema.json)
args:
  - --kubelet-insecure-tls
  - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
  - --kubelet-use-node-status-port
  - --metric-resolution=10s
  - --kubelet-request-timeout=2s
metrics:
  enabled: true
serviceMonitor:
  enabled: true
resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    memory: 448Mi
