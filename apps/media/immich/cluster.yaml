---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich
  namespace: media
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised

  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-0.3.0

  storage:
    size: 25Gi
    storageClass: openebs-hostpath

  managed:
    roles:
    - name: immich
      connectionLimit: -1
      ensure: present
      inherit: true
      superuser: true
      login: true

  bootstrap:
    initdb:
      database: immich
      encoding: UTF8
      localeCType: C
      localeCollate: C
      owner: immich
      secret:
        name: immich-db-url
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS cube CASCADE;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;

  postgresql:
    shared_preload_libraries:
    - vchord.so

  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg/immich
      endpointURL: http://10.0.60.15:30188
      region: garage
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-secret
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
