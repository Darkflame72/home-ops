---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: immich-redis
  namespace: media
spec:
  # renovate: datasource=docker depName=ghcr.io/dragonflydb/dragonfly
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0@sha256:0fa01a2b929e704c7a9300d23e7f52002ebd39e90996fb8bb63826aed92fa06f
  replicas: 1
  # media is enrolled in the Istio ambient mesh, which intercepts and
  # breaks the operator's raw redis/admin-port connections used for
  # readiness and master-election. Opt this pod out of ambient capture.
  podMetadata:
    labels:
      istio.io/dataplane-mode: none
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=1
    - --default_lua_flags=allow-undeclared-keys
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 320Mi
