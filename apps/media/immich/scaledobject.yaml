---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: immich-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immich-server
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 30
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://mimir-gateway.observability.svc.cluster.local/prometheus
        query: probe_success{job="blackbox-nfs",instance="10.0.60.15:2049"}
        threshold: "1"
        activationThreshold: "0"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: immich-machine-learning
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immich-machine-learning
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 30
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://mimir-gateway.observability.svc.cluster.local/prometheus
        query: probe_success{job="blackbox-nfs",instance="10.0.60.15:2049"}
        threshold: "1"
        activationThreshold: "0"
