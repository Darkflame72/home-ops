# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.34.0/secret-v1.json
apiVersion: v1
kind: Secret
metadata:
  name: immich-db-url
  namespace: media
type: Opaque
stringData:
  url: postgres://immich:{{ postgres_immich_pass }}@immich-rw.media.svc.cluster.local:5432/immich?sslmode=disable
  username: immich
  password: "{{ postgres_immich_pass }}"
