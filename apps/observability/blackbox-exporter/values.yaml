---
# No yaml-language-server schema available: prometheus-community/prometheus-blackbox-exporter
fullnameOverride: blackbox-exporter

config:
  modules:
    tcp_connect:
      prober: tcp
      timeout: 5s
      tcp:
        preferred_ip_protocol: ip4

resources:
  requests:
    cpu: 10m
    memory: 48Mi
  limits:
    memory: 192Mi

# OTel handles scraping — no ServiceMonitor needed
serviceMonitor:
  enabled: false
