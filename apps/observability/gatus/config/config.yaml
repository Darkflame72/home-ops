---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts: &alerts
      - type: discord

  # ICMP intervals are deliberately co-prime: when two ICMP checks fire in
  # the same second, replies get lost through cilium masquerade (identifier
  # collision) and show up as false "down" results.
  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 67s
    conditions:
      - "[CONNECTED] == true"
    alerts: *alerts

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 73s
    conditions:
      - "[CONNECTED] == true"
    alerts: *alerts

  - name: TrueNAS
    group: internal
    url: icmp://10.0.60.15
    interval: 5m13s
    conditions:
      - "[CONNECTED] == true"
    alerts: *alerts

  # These hostnames are dual-homed, so the sidecar's guarded DNS check can't
  # monitor the internal route (they legitimately resolve publicly). Resolve
  # via pihole to probe the envoy-internal path directly (for forgejo this
  # also bypasses anubis).
  - name: forgejo
    group: internal
    url: https://git.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  - name: argocd
    group: internal
    url: https://cd.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  # alert-relay is primarily an internal service (Alertmanager posts straight
  # to the ClusterIP); its only HTTPRoute exposes /ack/{token} for Discord
  # links, which isn't checkable, so gatus's HTTPRoute auto-discovery is
  # disabled for it in favor of hitting the in-cluster service's health check.
  - name: alert-relay
    group: internal
    url: http://alert-relay.kagent.svc.cluster.local:8080/healthz
    interval: 1m
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

metrics: true

storage:
  type: postgres
  caching: true
  path: ${POSTGRES_PATH}

ui:
  title: Status | Gatus
  header: Status

web:
  port: ${GATUS_WEB_PORT}

alerting:
  discord:
    webhook-url: "${DISCORD_WEBHOOK_URL}"
    default-alert:
      enabled: true
      failure-threshold: 3
      success-threshold: 2
      send-on-resolved: true
