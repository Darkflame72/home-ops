---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts: &alerts
      - type: discord

  # ICMP intervals are deliberately co-prime: when two ICMP checks fire in
  # the same second, replies get lost through cilium masquerade (identifier
  # collision) and show up as false "down" results.
  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 67s
    conditions:
      - "[CONNECTED] == true"
    alerts: *alerts

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 73s
    conditions:
      - "[CONNECTED] == true"
    alerts: *alerts

  - name: TrueNAS
    group: internal
    url: icmp://10.0.60.15
    interval: 5m13s
    conditions:
      - "[CONNECTED] == true"
    alerts: *alerts

  # These hostnames are dual-homed, so the sidecar's guarded DNS check can't
  # monitor the internal route (they legitimately resolve publicly). Resolve
  # via pihole to probe the envoy-internal path directly (for forgejo this
  # also bypasses anubis).
  - name: forgejo
    group: internal
    url: https://git.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  - name: argocd
    group: internal
    url: https://cd.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  # These are all single-homed to envoy-internal, so the auto-discovered
  # gatus-sidecar check would be "guarded" (DNS-only, asserting the
  # hostname doesn't resolve publicly) rather than an actual healthcheck.
  # Disabled via gatus.home-operations.com/enabled: "false" on each route
  # and replaced with a real HTTP check, resolved via pihole like the
  # dual-homed hosts above.
  - name: jellyfin
    group: internal
    url: https://jelly.darkflame.dev/health
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  - name: thelounge
    group: internal
    url: https://thelounge.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  - name: atuin
    group: internal
    url: https://sh.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  - name: miniflux
    group: internal
    url: https://miniflux.darkflame.dev/healthcheck
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  - name: bar-assistant
    group: internal
    url: https://bar.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  - name: kopia
    group: internal
    url: https://kopia.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  # OIDC-gated: an unauthenticated request to / redirects to the auth flow.
  - name: renovate
    group: internal
    url: https://renovate.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 302"
    alerts: *alerts

  - name: rook-dashboard
    group: internal
    url: https://rook.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 200"
    alerts: *alerts

  # No root route configured; a 404 from the app itself (as opposed to a
  # 502/503/504 from envoy with no backend) is the "healthy" response.
  - name: agentgateway
    group: internal
    url: https://agentgateway.darkflame.dev
    interval: 1m
    client:
      dns-resolver: tcp://192.168.1.2:53
    conditions:
      - "[STATUS] == 404"
    alerts: *alerts

metrics: true

storage:
  type: postgres
  caching: true
  path: ${POSTGRES_PATH}

ui:
  title: Status | Gatus
  header: Status

web:
  port: ${GATUS_WEB_PORT}

alerting:
  discord:
    webhook-url: "${DISCORD_WEBHOOK_URL}"
    default-alert:
      enabled: true
      failure-threshold: 3
      success-threshold: 2
      send-on-resolved: true
