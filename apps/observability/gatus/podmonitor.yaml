---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gatus-postgres
  namespace: observability
spec:
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      cnpg.io/cluster: gatus-postgres
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
          targetLabel: cluster
