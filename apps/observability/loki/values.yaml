# No yaml-language-server schema available: grafana-community/loki
deploymentMode: Monolithic

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    bucketNames:
      chunks: ${BUCKET_NAME}
      ruler: ${BUCKET_NAME}
    use_thanos_objstore: true
    object_store:
      type: s3
      s3:
        endpoint: ${BUCKET_HOST}:${BUCKET_PORT}
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        insecure: true
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    allow_structured_metadata: true
    retention_period: 720h
  compactor:
    retention_enabled: true
    delete_request_store: s3

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 160m
      memory: 640Mi
    limits:
      memory: 2560Mi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3100"
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-bucket
    - configMapRef:
        name: loki-bucket
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ceph-block

sidecar:
  resources:
    requests:
      cpu: 10m
      memory: 144Mi
    limits:
      memory: 576Mi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      memory: 128Mi
  metrics:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

lokiCanary:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi

chunksCache:
  enabled: false

resultsCache:
  enabled: false

monitoring:
  dashboards:
    enabled: true

minio:
  enabled: false
