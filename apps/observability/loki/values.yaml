# No yaml-language-server schema available: grafana-community/loki
deploymentMode: Monolithic

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    use_thanos_objstore: true
    object_store:
      type: s3
      s3:
        bucket: ${BUCKET_NAME}
        endpoint: ${BUCKET_HOST}:${BUCKET_PORT}
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        insecure: true
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    allow_structured_metadata: true

singleBinary:
  replicas: 1
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-bucket
    - configMapRef:
        name: loki-bucket
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ceph-block

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: true
  replicas: 1

minio:
  enabled: false
