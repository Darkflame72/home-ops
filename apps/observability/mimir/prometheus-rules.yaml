---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
# General cluster infra-health rules, synced into Mimir's ruler by Alloy's
# mimir.rules.kubernetes component (apps/observability/alloy/values.yaml).
# Ceph-specific health/capacity alerting already lives in
# apps/rook-ceph/cluster/prometheus-rules.yaml — don't duplicate here.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infra-health-rules
  namespace: observability
spec:
  groups:
    - name: node-health
      rules:
        - alert: KubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not Ready"
            description: "Node {{ $labels.node }} has been in a NotReady state for more than 15 minutes."
        - alert: KubeNodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} is under disk pressure"
            description: "Node {{ $labels.node }} has reported DiskPressure=true for more than 10 minutes."
        - alert: KubeNodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} is under memory pressure"
            description: "Node {{ $labels.node }} has reported MemoryPressure=true for more than 10 minutes."

    - name: node-resources
      rules:
        - alert: NodeFilesystemAlmostOutOfSpace
          expr: (node_filesystem_avail_bytes{fstype!=""} / node_filesystem_size_bytes{fstype!=""} * 100 < 15) and node_filesystem_readonly{fstype!=""} == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Filesystem running low on space on {{ $labels.instance }}"
            description: "Mount {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 15% free space."
        - alert: NodeFilesystemOutOfSpaceCritical
          expr: (node_filesystem_avail_bytes{fstype!=""} / node_filesystem_size_bytes{fstype!=""} * 100 < 5) and node_filesystem_readonly{fstype!=""} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Filesystem critically low on space on {{ $labels.instance }}"
            description: "Mount {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 5% free space."
        - alert: NodeMemoryHighUtilization
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory usage is high"
            description: "Node {{ $labels.instance }} has used more than 90% of its memory for 15 minutes."

    - name: workload-health
      rules:
        - alert: KubePodCrashLooping
          expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been in CrashLoopBackOff for more than 15 minutes."
        - alert: KubeDeploymentReplicasUnavailable
          expr: kube_deployment_status_replicas_unavailable > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
            description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has had unavailable replicas for more than 30 minutes."
        - alert: KubeStatefulSetReplicasMismatch
          expr: kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} replica mismatch"
            description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched its desired ready replica count for more than 30 minutes."

    - name: kyverno-policy-violations
      rules:
        # Kyverno's reports-controller only fully re-verifies an unchanged
        # resource once per backgroundScanInterval (1h, see
        # apps/policy/kyverno/values.yaml). A single fail is frequently just
        # transient scan noise (cosign/Rekor cold-evaluation blips on
        # recently-touched resources) that clears on the very next pass.
        # `for: 75m` requires the violation to still be present after that
        # next independent rescan before it counts as real — i.e. it has to
        # fail twice, not once. policy-reporter's direct AlertManager push
        # (apps/policy/policy-reporter/values.yaml) is disabled in favor of
        # this rule so we don't double-alert.
        #
        # Only policy_report_result (namespaced reports) is queried, not
        # cluster_policy_report_result — every policy we alert on here
        # (require-requests-limits/disallow-latest-tag/require-run-as-nonroot/
        # verify-image-signatures-*) matches namespaced Pods, so it never
        # produces a ClusterPolicyReport. The policy-reporter-monitoring
        # ServiceMonitor scrapes the policy-reporter pod itself (namespace
        # observability), so the metric's own resource-namespace label is
        # relabeled to exported_namespace to avoid colliding with the scrape
        # target's namespace — group/annotate on that, not `namespace`.
        - alert: KyvernoPolicyViolationPersistent
          expr: >-
            max by (exported_namespace, name, kind, policy, rule, category, severity) (
              policy_report_result{status=~"fail|error", severity=~"medium|high|critical"}
            ) == 1
          for: 75m
          annotations:
            summary: "Kyverno policy {{ $labels.policy }} still failing on {{ $labels.exported_namespace }}/{{ $labels.kind }}/{{ $labels.name }}"
            description: "{{ $labels.policy }} ({{ $labels.category }}) has failed continuously for over 75 minutes on {{ $labels.exported_namespace }}/{{ $labels.kind }}/{{ $labels.name }} — this survived at least one full Kyverno background-scan cycle, so it's unlikely to be transient scan noise."

    - name: certificates
      rules:
        - alert: CertManagerCertExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 86400
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} expires soon"
            description: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} expires in less than 14 days and has not renewed."
        - alert: CertManagerCertExpiringCritical
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 3 * 86400
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} expires very soon"
            description: "Certificate {{ $labels.exported_namespace }}/{{ $labels.name }} expires in less than 3 days and has not renewed."
