# No yaml-language-server schema available: grafana/mimir-distributed
# Running in minimal single-replica mode.
# OBC secret "mimir-bucket" and configmap "mimir-bucket" are injected via global.extraEnvFrom.
# config.expand-env is set automatically by the chart — no need to set it in extraArgs.

fullnameOverride: mimir

global:
  extraEnvFrom:
    - secretRef:
        name: mimir-bucket
    - configMapRef:
        name: mimir-bucket

mimir:
  structuredConfig:
    multitenancy_enabled: false
    ingester:
      push_grpc_method_enabled: true
      ring:
        replication_factor: 1
    common:
      storage:
        backend: s3
        s3:
          endpoint: ${BUCKET_HOST}:${BUCKET_PORT}
          access_key_id: ${AWS_ACCESS_KEY_ID}
          secret_access_key: ${AWS_SECRET_ACCESS_KEY}
          insecure: true
    blocks_storage:
      s3:
        bucket_name: ${BUCKET_NAME}
    ruler_storage:
      storage_prefix: ruler
      s3:
        bucket_name: ${BUCKET_NAME}
    alertmanager_storage:
      storage_prefix: alertmanager
      s3:
        bucket_name: ${BUCKET_NAME}
    limits:
      ingestion_rate: 150000
      ingestion_burst_size: 300000
      max_global_series_per_user: 10000000
    ingest_storage:
      enabled: false

kafka:
  enabled: false

alertmanager:
  enabled: true
  replicas: 1
  statefulSet:
    enabled: true
  zoneAwareReplication:
    enabled: false
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
  extraVolumes:
    - name: discord-webhook
      secret:
        secretName: mimir-alertmanager-discord
  extraVolumeMounts:
    - name: discord-webhook
      mountPath: /etc/alertmanager/secrets
      readOnly: true
  fallbackConfig: |
    route:
      receiver: discord
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - receiver: kagent-relay
          matchers:
            - severity =~ "critical|warning"
            - alertname != "Watchdog"
          continue: true
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: discord-critical
          matchers:
            - severity = "critical"
        - receiver: discord
          matchers: []
    receivers:
      - name: "null"
      - name: discord
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/discord-webhook
            title: &discord_title '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .CommonLabels.alertname }} — {{ .CommonLabels.namespace }} ({{ .CommonLabels.severity }})'
            message: &discord_message |-
              {{ range .Alerts }}
              {{ if eq .Status "firing" }}**FIRING**{{ else }}**RESOLVED**{{ end }}: {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{- if .Labels.pod }}
              Pod: `{{ .Labels.pod }}`
              {{- end }}

              {{ end }}
              [🔍 View metric history](https://grafana.darkflame.dev/explore?left={{ printf "{\"datasource\":\"a77e92f1-3318-470d-92d9-499ed1fec5fc\",\"queries\":[{\"expr\":\"ALERTS{alertname=\\\"%s\\\"}\",\"refId\":\"A\"}],\"range\":{\"from\":\"now-6h\",\"to\":\"now\"}}" .CommonLabels.alertname | urlquery }})
      - name: discord-critical
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/discord-webhook
            content: "<@456217109236809748>"
            title: *discord_title
            message: *discord_message
      - name: kagent-relay
        webhook_configs:
          - url: http://alert-relay.kagent.svc.cluster.local:8080/alertmanager
            send_resolved: false

compactor:
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

distributor:
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    size: 10Gi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

querier:
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

query_frontend:
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

ruler:
  enabled: true
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

gateway:
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"

rollout_operator:
  enabled: false

metaMonitoring:
  dashboards:
    enabled: true

minio:
  enabled: false
