# No yaml-language-server schema available: open-telemetry/opentelemetry-kube-stack
opentelemetry-operator:
  manager:
    collectorImage:
      repository: otel/opentelemetry-collector-contrib

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

defaultCRConfig:
  config:
    exporters:
      debug: {}
      otlp_http/mimir:
        endpoint: http://mimir-gateway.observability.svc.cluster.local/otlp
        tls:
          insecure: true
      otlp_http/loki:
        endpoint: http://loki-gateway.observability.svc.cluster.local/otlp
        tls:
          insecure: true
      otlp/tempo:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true

# Single daemonset collector handles all signals.
# clusterMetrics and kubernetesEvents use the leader election extension to run only on one node.
collectors:
  cluster:
    enabled: true
    mode: statefulset
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    targetAllocator:
      enabled: true
      allocationStrategy: consistent-hashing
      prometheusCR:
        enabled: true
        scrapeInterval: 30s
        serviceMonitorSelector: {}
        podMonitorSelector: {}
    config:
      receivers:
        prometheus:
          config:
            scrape_configs:
              - job_name: truenas-node
                static_configs:
                  - targets:
                    - 10.0.60.15:9100
                    labels:
                      instance: truenas
              - job_name: truenas-smartctl
                static_configs:
                  - targets:
                    - 10.0.60.15:9633
                    labels:
                      instance: truenas
              - job_name: blackbox-nfs
                metrics_path: /probe
                params:
                  module: [tcp_connect]
                static_configs:
                  - targets:
                    - 10.0.60.15:2049
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: __param_target
                  - source_labels: [__param_target]
                    target_label: instance
                  - target_label: __address__
                    replacement: blackbox-exporter.observability.svc.cluster.local:9115
              - job_name: coredns
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names: [kube-system]
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                    action: keep
                    regex: kube-dns
                  - source_labels: [__meta_kubernetes_pod_ip]
                    replacement: $$1:9153
                    target_label: __address__
                  - target_label: job
                    replacement: coredns
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
              - job_name: kubernetes-pods
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: keep
                    regex: "true"
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                    action: replace
                    target_label: __metrics_path__
                    regex: (.+)
                  - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
                    action: replace
                    regex: (.+);(\d+)
                    replacement: $$1:$$2
                    target_label: __address__
                  - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_app_kubernetes_io_name]
                    separator: /
                    target_label: job
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: node
          target_allocator:
            endpoint: http://opentelemetry-kube-stack-collector-targetallocator:80
            interval: 30s
            collector_id: ${POD_NAME}
      processors:
        memory_limiter:
          check_interval: 1s
          limit_percentage: 75
          spike_limit_percentage: 15
        batch:
          send_batch_size: 1000
          timeout: 1s
      service:
        pipelines:
          metrics:
            receivers: [prometheus]
            processors: [memory_limiter, batch]
            exporters: [otlp_http/mimir, debug]
  daemon:
    enabled: true
    mode: daemonset
    config:
      service:
        pipelines:
          traces:
            exporters: [otlp/tempo, debug]
          metrics:
            exporters: [otlp_http/mimir, debug]
          logs:
            exporters: [otlp_http/loki, debug]
    presets:
      logsCollection:
        enabled: true
      hostMetrics:
        enabled: true
      kubeletMetrics:
        enabled: true
      kubernetesAttributes:
        enabled: true
      kubernetesEvents:
        enabled: true
      clusterMetrics:
        enabled: true
