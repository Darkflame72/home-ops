# No yaml-language-server schema available: open-telemetry/opentelemetry-kube-stack
opentelemetry-operator:
  manager:
    collectorImage:
      repository: otel/opentelemetry-collector-contrib

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

defaultCRConfig:
  config:
    exporters:
      otlp_http/mimir:
        endpoint: http://mimir-gateway.observability.svc.cluster.local/otlp
        tls:
          insecure: true
      otlp_http/loki:
        endpoint: http://loki-gateway.observability.svc.cluster.local/otlp
        tls:
          insecure: true
      otlp/tempo:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          exporters: [otlp/tempo, debug]
        metrics:
          exporters: [otlp_http/mimir, debug]
        logs:
          exporters: [otlp_http/loki, debug]

# Single daemonset collector handles all signals.
# clusterMetrics and kubernetesEvents use the leader election extension to run only on one node.
collectors:
  cluster:
    enabled: true
    mode: deployment
    config:
      receivers:
        prometheus:
          config:
            scrape_configs:
              - job_name: kubernetes-pods
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: keep
                    regex: "true"
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                    action: replace
                    target_label: __metrics_path__
                    regex: (.+)
                  - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
                    action: replace
                    regex: (.+);(\d+)
                    replacement: ${1}:${2}
                    target_label: __address__
                  - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_app_kubernetes_io_name]
                    separator: /
                    target_label: job
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: node
      service:
        pipelines:
          metrics:
            receivers: [prometheus]
            exporters: [otlp_http/mimir]
  daemon:
    enabled: true
    mode: daemonset
    config:
      service:
        pipelines:
          traces:
            exporters: [otlp/tempo, debug]
          metrics:
            exporters: [otlp_http/mimir, debug]
          logs:
            exporters: [otlp_http/loki, debug]
    presets:
      logsCollection:
        enabled: true
      hostMetrics:
        enabled: true
      kubeletMetrics:
        enabled: true
      kubernetesAttributes:
        enabled: true
      kubernetesEvents:
        enabled: true
      clusterMetrics:
        enabled: true
