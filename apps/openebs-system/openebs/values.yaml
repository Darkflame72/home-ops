# No yaml-language-server schema available: openebs/openebs (no values.schema.json)
preUpgradeHook:
  enabled: false
localpv-provisioner:
  analytics:
    enabled: false
  localpv:
    image:
      registry: quay.io/
    basePath: &hostPath /var/mnt/local-hostpath
    resources:
      requests:
        cpu: 10m
        memory: 48Mi
      limits:
        memory: 192Mi
  hostpathClass:
    enabled: true
    name: openebs-hostpath
    isDefaultClass: false
    basePath: *hostPath
  helperPod:
    image:
      registry: quay.io/
openebs-crds:
  csi:
    volumeSnapshots:
      enabled: false
      keep: false
zfs-localpv:
  enabled: false
lvm-localpv:
  enabled: false
mayastor:
  enabled: false
engines:
  local:
    lvm:
      enabled: false
    zfs:
      enabled: false
  replicated:
    mayastor:
      enabled: false
loki:
  enabled: false
alloy:
  enabled: false
minio:
  enabled: false
