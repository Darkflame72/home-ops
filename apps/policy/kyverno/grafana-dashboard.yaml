---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kyverno
  namespace: policy
spec:
  # Kyverno self-excludes its own install namespace from policy processing
  # (resourceFilters: [*/*,policy,*]), so the grafana-dashboard-generate
  # ClusterPolicy can never see kyverno-grafana-grafana. Defined statically
  # here instead.
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  configMapRef:
    name: kyverno-grafana-grafana
    key: kyverno-dashboard.json
