---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/policyexception_v1.json
#
# Targets CEL ValidatingPolicy via policyRefs+matchConditions — the legacy
# kyverno.io/v2 PolicyException keys off ruleNames, which CEL policies don't
# have, so it would silently match nothing. Name-glob patterns like "foo-*"
# are ported as .startsWith('foo').
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: rook-ceph-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      Ceph daemons (mon/mgr/mds/osd/rgw/exporter/crashcollector) and the CSI
      plugins run as root by design (device ownership, chown of
      /var/lib/ceph, bind-mounting host paths). The osd-prepare Job runs the
      same provisioning code path (wipes/formats raw block devices) and
      needs root for the same reason. require-run-as-nonroot can never be
      satisfied here without breaking storage.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: rook-ceph-namespace
      expression: "object.metadata.namespace == 'rook-ceph'"

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: rook-ceph-privileged
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      OSDs and the CSI node plugins need privileged mode for raw block
      device access and mount namespace operations on the host. The
      osd-prepare Job needs the same for device discovery/wiping before an
      OSD exists to hand it off to.
spec:
  policyRefs:
    - name: disallow-privileged-containers
      kind: ValidatingPolicy
  matchConditions:
    - name: rook-ceph-privileged-workloads
      expression: >-
        object.metadata.namespace == 'rook-ceph' &&
        (object.metadata.name.startsWith('rook-ceph-osd-') ||
         object.metadata.name.startsWith('rook-ceph.cephfs.csi.ceph.com-nodeplugin') ||
         object.metadata.name.startsWith('rook-ceph.rbd.csi.ceph.com-nodeplugin'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: rook-ceph-log-collector-limits
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      The log-collector sidecar injected into Ceph daemon pods (mon/osd/mds/
      rgw/etc.) is controlled entirely by CephCluster.spec.logCollector
      (enabled/maxLogSize/periodicity only) — there is no field to set its
      container resources, verified against the CephCluster CRD schema.
spec:
  policyRefs:
    - name: require-requests-limits
      kind: ValidatingPolicy
  matchConditions:
    - name: rook-ceph-namespace
      expression: "object.metadata.namespace == 'rook-ceph'"

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: cilium-run-as-root-privileged
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      cilium and cilium-envoy need root and privileged mode to manage host
      networking (iptables/eBPF programs, network namespaces). cilium-operator
      is scratch-based with no USER directive (runs as root) and upstream
      non-root support is still unresolved (cilium/cilium#23217) — it isn't
      privileged, just root, so it's excepted from require-run-as-nonroot only.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
    - name: disallow-privileged-containers
      kind: ValidatingPolicy
  matchConditions:
    - name: cilium-workloads
      expression: >-
        object.metadata.namespace == 'kube-system' &&
        (object.metadata.name == 'cilium' || object.metadata.name.startsWith('cilium-'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: cilium-operator-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      cilium-operator's image is scratch-based with no USER directive (runs
      as root by default) and upstream non-root support is still unresolved
      (cilium/cilium#23217, verified against the Dockerfile directly).
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: cilium-operator-workloads
      expression: >-
        object.metadata.namespace == 'kube-system' &&
        object.metadata.name.startsWith('cilium-operator')

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: envoy-gateway-shutdown-manager-limits
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      The shutdown-manager sidecar injected into every Envoy Gateway-managed
      Deployment (envoy-external, envoy-internal) is hardcoded by the
      envoy-gateway controller with a fixed requests-only resource block
      (cpu: 10m, memory: 32Mi) via DefaultShutdownManagerCPUResourceRequests
      / DefaultShutdownManagerMemoryResourceRequests in the controller
      source. There is no EnvoyProxy or EnvoyGateway API field to set a
      memory limit on it (verified against api/v1alpha1 in envoy-gateway
      v1.8.2), so require-requests-limits can never be satisfied here.
spec:
  policyRefs:
    - name: require-requests-limits
      kind: ValidatingPolicy
  matchConditions:
    - name: envoy-gateway-workloads
      expression: >-
        object.metadata.namespace == 'network' &&
        (object.metadata.name.startsWith('envoy-external') ||
         object.metadata.name.startsWith('envoy-internal'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: forgejo-runner-dind-privileged
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      The dind (docker:dind) sidecar backing the Forgejo Actions runner needs
      privileged mode and root to run nested containers — this is an
      unavoidable requirement of Docker-in-Docker, not a misconfiguration.
      The runner container itself (the other container in this Deployment)
      is no longer privileged (it doesn't need host device access) but
      stays root too: its image has no non-root user, and it needs to reach
      dind's docker.sock which is root:docker owned.
spec:
  policyRefs:
    - name: disallow-privileged-containers
      kind: ValidatingPolicy
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: forgejo-runner-workloads
      expression: >-
        object.metadata.namespace == 'forgejo-runners' &&
        object.metadata.name.startsWith('forgejo-runner')

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: otel-daemon-collector-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      The daemon-mode OTel collector runs logsCollection (reads
      /var/log/pods, root:root 0640 on containerd), hostMetrics, and
      kubeletMetrics presets against host paths. Unlike the cluster
      collector (otel-contrib image is non-root by default, UID 10001), the
      daemon collector's host log/proc access is the blocker, not the image
      itself — matches the same host-access reasoning already applied to
      cilium/istio-cni-node/ztunnel.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: otel-daemon-collector-workloads
      expression: >-
        object.metadata.namespace == 'observability' &&
        object.metadata.name.startsWith('opentelemetry-kube-stack-daemon-collector')

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: comms-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      phanpy (ghcr.io/yitsushi/phanpy-docker, nginx:alpine base) and redbot
      (ghcr.io/phasecorex/red-discordbot, extra-audio tag) both confirmed
      running as UID 0 live (kubectl exec ... id) with no USER directive in
      the base image and no PUID/PGID configured in our values. Forcing
      runAsNonRoot would crash-loop them; a real fix needs PUID/PGID env
      vars plus a volume ownership migration for redbot's existing /data,
      which is out of scope here.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: comms-workloads
      expression: >-
        object.metadata.namespace == 'comms' &&
        (object.metadata.name.startsWith('phanpy') ||
         object.metadata.name.startsWith('redbot'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: default-ns-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      excalidraw (docker.io/excalidraw/excalidraw, nginx:stable-alpine-slim,
      no USER directive) and littlelink
      (ghcr.io/timothystewart6/littlelink-server) both confirmed running as
      UID 0 live despite littlelink's project docs claiming non-root
      support — the deployed "latest" tag doesn't reflect that. bar-assistant's
      meilisearch (search) container is docker.io/getmeili/meilisearch,
      which dropped non-root support in v0.25.0 after bugs
      (github.com/meilisearch/meilisearch/issues/2051) and remains root.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: default-ns-workloads
      expression: >-
        object.metadata.namespace == 'default' &&
        (object.metadata.name.startsWith('excalidraw') ||
         object.metadata.name.startsWith('littlelink') ||
         object.metadata.name.startsWith('bar-assistant'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: immich-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      immich-server and immich-machine-learning (ghcr.io/immich-app/immich-*)
      have no USER directive in their Dockerfiles and run as UID 0 by
      design; the official non-root guide is reported unreliable
      (github.com/immich-app/immich/discussions/13124). Confirmed root live.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: immich-workloads
      expression: >-
        object.metadata.namespace == 'media' &&
        (object.metadata.name.startsWith('immich-server') ||
         object.metadata.name.startsWith('immich-machine-learning'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: openebs-localpv-provisioner-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      openebs/provisioner-localpv needs root to chown newly provisioned
      hostPath volumes to the requesting pod's UID/GID; the chart's own
      `localpv.privileged` defaults to true for this reason. Confirmed
      running as UID 0 live.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: openebs-provisioner-workloads
      expression: >-
        object.metadata.namespace == 'openebs-system' &&
        object.metadata.name.startsWith('openebs-localpv-provisioner')

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: openebs-localpv-helper-pods
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      openebs/provisioner-localpv spawns bare helper Pods (init-pvc-*,
      cleanup-pvc-*) directly via client-go (no owning Deployment/
      ReplicaSet) to chown/mkdir/rm the hostPath directory backing each PVC
      on the target node. Their spec is hardcoded by the provisioner binary
      itself — the chart's `localpv.helperPod` values block only exposes
      `image`, no securityContext or resources fields — so they run
      privileged/root with no limits and can't be brought into compliance
      from this repo.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
    - name: disallow-privileged-containers
      kind: ValidatingPolicy
    - name: require-requests-limits
      kind: ValidatingPolicy
  matchConditions:
    - name: openebs-helper-pods
      expression: >-
        object.metadata.namespace == 'openebs-system' &&
        (object.metadata.name.startsWith('init-pvc-') ||
         object.metadata.name.startsWith('cleanup-pvc-'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: alloy-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      grafana/alloy runs as root by default; Grafana documents non-root
      support as experimental/undocumented
      (grafana.com/docs/alloy/latest/configure/nonroot/). Confirmed running
      as UID 0 live.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: alloy-workloads
      expression: >-
        object.metadata.namespace == 'observability' &&
        object.metadata.name.startsWith('alloy')

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: spegel-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      spegel needs read access to the root-owned containerd socket
      (/run/containerd/containerd.sock) on every node to mirror OCI images
      P2P; this requires root.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: spegel-workloads
      expression: >-
        object.metadata.namespace == 'kube-system' &&
        object.metadata.name.startsWith('spegel')

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: dragonfly-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      ghcr.io/dragonflydb/dragonfly confirmed running as UID 0 live; no
      documented non-root Dockerfile USER found upstream.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: dragonfly-workloads
      expression: >-
        object.metadata.namespace == 'database' &&
        object.metadata.name.startsWith('dragonfly')

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: talos-static-control-plane-pods
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      kube-apiserver/kube-controller-manager/kube-scheduler are Talos
      static pods (app.kubernetes.io/managed-by: Talos), defined by Talos
      machine config directly on the control-plane nodes — not something
      this repo's Helm/Kustomize manages, so there's no values file to add
      resources or securityContext to.
spec:
  policyRefs:
    - name: require-requests-limits
      kind: ValidatingPolicy
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: talos-static-pods
      expression: >-
        object.metadata.namespace == 'kube-system' &&
        object.metadata.?labels['app.kubernetes.io/managed-by'].orValue('') == 'Talos'

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: istio-ambient-dataplane-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      istio-cni-node and ztunnel need root to install the CNI plugin on the
      host and to manage pod network namespaces for ambient mesh redirection.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: istio-ambient-dataplane-workloads
      expression: >-
        object.metadata.namespace == 'istio-system' &&
        (object.metadata.name.startsWith('istio-cni-node') ||
         object.metadata.name.startsWith('ztunnel'))

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: kopiur-controller-limits
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      kopiur's controller deliberately ships with no memory limit: on
      (re)start it reconciles every existing resource at once, spawning
      concurrent in-process kopia subprocesses whose RSS counts against the
      container's cgroup, and a limit that doesn't cover that startup burst
      OOMKills it into a crash loop (documented in the chart's own
      values.yaml). The webhook and kopia-ui server carry the same
      no-limits-by-default posture from the chart, but are labeled
      app.kubernetes.io/managed-by: Helm (the chart's own Deployments/Pods),
      not managed-by: kopiur, so they're covered by the namespace match
      below instead. Mover Jobs (one per backup/restore/maintenance run)
      also ship with no resources set and run in the WORKLOAD's namespace,
      not kopiur-system, and are labeled managed-by: kopiur by the
      operator, so those are matched by label across all namespaces.
spec:
  policyRefs:
    - name: require-requests-limits
      kind: ValidatingPolicy
  matchConditions:
    - name: kopiur-namespace-or-managed-jobs
      expression: >-
        object.metadata.namespace == 'kopiur-system' ||
        object.metadata.?labels['app.kubernetes.io/managed-by'].orValue('') == 'kopiur'

---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: nextcloud-run-as-root
  namespace: policy
  annotations:
    policies.kyverno.io/description: >-
      docker.io/library/nextcloud:apache flavor doesn't support running as
      non-root — Apache needs root to bind port 80 and the upstream request
      to support this was closed "not planned"
      (github.com/nextcloud/docker/issues/760). Confirmed running as UID 0
      live. The nextcloud-cron CronJob already runs non-root (UID 33) since
      it doesn't bind privileged ports, so it isn't covered by this
      exception — matched by component label, not name, to avoid excepting
      the cron pods too.
spec:
  policyRefs:
    - name: require-run-as-nonroot
      kind: ValidatingPolicy
  matchConditions:
    - name: nextcloud-app-workloads
      expression: >-
        object.metadata.namespace == 'default' &&
        object.metadata.?labels['app.kubernetes.io/name'].orValue('') == 'nextcloud' &&
        object.metadata.?labels['app.kubernetes.io/component'].orValue('') == 'app'
