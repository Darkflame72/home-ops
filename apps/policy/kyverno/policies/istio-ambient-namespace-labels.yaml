---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/mutatingpolicy_v1.json
#
# Empty resourceNames in matchConstraints means "match everything" per the
# Kubernetes API — the opposite of what an empty list should mean for an
# allow-list — so the allow-list is enforced via matchConditions instead
# (object.metadata.name in [...]), unambiguous whether the list is empty or not.
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: istio-ambient-namespace-labels
  annotations:
    policies.kyverno.io/title: Istio Ambient Namespace Labels
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Labels the listed namespaces istio.io/dataplane-mode=ambient, onboarding
      them onto the Istio ambient mesh. Explicit allow-list rather than
      exclude-all so new namespaces are never silently meshed.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: namespace-in-allowlist
      expression: "object.metadata.name in [\"media\", \"security\", \"comms\", \"default\", \"agents\", \"observability\", \"renovate\"]"
  evaluation:
    mutateExisting:
      enabled: true
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            metadata: Object.metadata{
              labels: {"istio.io/dataplane-mode": "ambient"}
            }
          }
