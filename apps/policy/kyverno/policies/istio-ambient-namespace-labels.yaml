---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: istio-ambient-namespace-labels
  annotations:
    policies.kyverno.io/title: Istio Ambient Namespace Labels
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Labels the listed namespaces istio.io/dataplane-mode=ambient, onboarding
      them onto the Istio ambient mesh (istiod/ztunnel/cni installed under
      istio-system). Uses an explicit allow-list rather than exclude-all so new
      namespaces are never silently meshed without review. "network" and
      "observability" are included because they act as trusted cross-namespace
      callers (ingress gateway, metrics scraping, gatus) for the default-deny
      AuthorizationPolicies generated by istio-default-authz.yaml — see that
      policy for why source AND destination namespace both need to be meshed
      for source.namespaces matching to work.
      kube-system is deliberately excluded (DNS-critical, too high blast
      radius to onboard without a maintenance window).

      FULL ROLLBACK (2026-07-17): onboarding "database" broke Dragonfly's
      StatefulSet ClusterIP Service and internal replication (fixed by
      excluding it). Hours later, CNPG clusters in every other meshed
      namespace (comms, default, media, observability, security) were
      found stuck in the same class of failure since the exact second
      the default-deny AuthorizationPolicy first went live
      (2026-07-16T21:35:38Z, per each Cluster's stale "ClusterIsNotReady"
      condition) — the operator's port-8000 instance-manager
      communication was silently broken cluster-wide for ~3 hours,
      not self-healing, and not fixed by restarting the affected pods
      (unlike the Dragonfly case). Client applications kept working
      (they go through a Service on 5432), but CNPG's own HA/failover
      monitoring was blind the whole time. Given ambient mesh has now
      broken two independent StatefulSet-style workloads via two
      different mechanisms in the same session, onboarding is fully
      rolled back pending a proper investigation in a maintenance
      window rather than continuing to find and patch namespaces one
      at a time. istiod/cni/ztunnel remain installed (apps/istio-system),
      just nothing is onboarded.
      This ClusterPolicy is currently NOT referenced by
      apps/policy/kyverno/policies/kustomization.yaml (deliberately
      unwired, not deleted, so this history/rationale stays discoverable
      for whoever picks this back up).
spec:
  admission: true
  emitWarning: false
  mutateExistingOnPolicyUpdate: true
  rules:
    - name: label-namespace-ambient
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - agents
                - comms
                - default
                - games
                - media
                - network
                - observability
                - security
      mutate:
        targets:
          - apiVersion: v1
            kind: Namespace
            name: "{{request.object.metadata.name}}"
        patchStrategicMerge:
          metadata:
            labels:
              istio.io/dataplane-mode: ambient
