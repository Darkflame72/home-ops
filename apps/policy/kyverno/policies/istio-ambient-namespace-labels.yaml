---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: istio-ambient-namespace-labels
  annotations:
    policies.kyverno.io/title: Istio Ambient Namespace Labels
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Labels the listed namespaces istio.io/dataplane-mode=ambient, onboarding
      them onto the Istio ambient mesh (istiod/ztunnel/cni installed under
      istio-system). Uses an explicit allow-list rather than exclude-all so new
      namespaces are never silently meshed without review. "network" and
      "observability" are included because they act as trusted cross-namespace
      callers (ingress gateway, metrics scraping, gatus) for the default-deny
      AuthorizationPolicies generated by istio-default-authz.yaml — see that
      policy for why source AND destination namespace both need to be meshed
      for source.namespaces matching to work.
      kube-system is deliberately excluded (DNS-critical, too high blast
      radius to onboard without a maintenance window). "database" is also
      deliberately excluded (see FULL ROLLBACK below) — the CNPG operator
      and Dragonfly both run there and Dragonfly's StatefulSet replication
      breaks under ambient.

      FULL ROLLBACK (2026-07-17): onboarding "database" broke Dragonfly's
      StatefulSet ClusterIP Service and internal replication (fixed by
      excluding it — still excluded, unresolved). Hours later, CNPG
      clusters in every other meshed namespace (comms, default, media,
      observability, security) were found stuck in the same class of
      failure since the exact second the default-deny AuthorizationPolicy
      first went live (2026-07-16T21:35:38Z, per each Cluster's stale
      "ClusterIsNotReady" condition) — the operator's port-8000
      instance-manager communication was silently broken cluster-wide for
      ~3 hours, not self-healing, and not fixed by restarting the affected
      pods (unlike the Dragonfly case). Root cause: the CNPG operator runs
      in "database", which is unmeshed, so ztunnel couldn't verify its
      identity against the new default-deny policies in every other
      namespace it polls.

      RE-ENABLED, THEN RE-ROLLED-BACK (2026-07-19): re-enabled with a fix
      for the CNPG issue above (workload-scoped allow-cnpg-instance-manager
      AuthorizationPolicy, port 8000 only, no `from` clause — see
      istio-default-authz.yaml — mirroring the existing mimir-gateway/KEDA
      and forgejo-runners exceptions), onboarding one namespace at a time
      this time instead of all 6 at once. First namespace tried was
      "network" (envoy-external/envoy-internal/envoy-gateway, the sole
      ingress path) — it has no default-deny AuthorizationPolicy generated
      for it, so this wasn't the CNPG failure mode. Instead, within minutes
      of the label landing, envoy-external started intermittently resetting
      already-established upstream connections
      (response_flags "UC" / "upstream_reset_before_response_started
      {connection_termination}") to backends in unrelated namespaces
      (argocd, observability), causing live intermittent 503s on
      externally-exposed hosts (confirmed on cd.darkflame.dev,
      grafana.darkflame.dev). This is a third distinct ambient-mesh failure
      mode (connection-level disruption from ztunnel/CNI redirection on the
      ingress-hosting namespace itself, unrelated to AuthorizationPolicy),
      on top of the Dragonfly StatefulSet break and the CNPG operator
      identity issue above. Rolled back again the same day — namespace list
      below is empty pending investigation of this new failure mode.
      Suggests "network" (envoy) may need to go last, or not at all,
      rather than first, when this is revisited: it has the highest blast
      radius (sole ingress path) for a class of ambient failure that isn't
      mitigated by the AuthorizationPolicy exceptions used for the other
      two failure modes.
spec:
  admission: true
  emitWarning: false
  mutateExistingOnPolicyUpdate: true
  rules:
    - name: label-namespace-ambient
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names: []
      mutate:
        targets:
          - apiVersion: v1
            kind: Namespace
            name: "{{request.object.metadata.name}}"
        patchStrategicMerge:
          metadata:
            labels:
              istio.io/dataplane-mode: ambient
