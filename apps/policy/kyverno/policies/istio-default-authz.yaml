apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-observability-allow-mimir-gateway-scaledobjects
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — mimir-gateway/KEDA exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Workload-scoped exception (no `from` clause) for KEDA (kube-system,
      unmeshed) polling mimir-gateway for ScaledObject triggers. See the
      file header for why this can't just widen observability's allow-list.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["observability"]
  evaluation:
    synchronize:
      enabled: true
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-mimir-gateway-keda",
              "namespace": "observability"
            }),
            "spec": dyn({
              "selector": dyn({
                "matchLabels": {
                  "app.kubernetes.io/name": "mimir",
                  "app.kubernetes.io/component": "gateway"
                }
              }),
              "rules": dyn([dyn({})])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('observability', variables.downstream)"

