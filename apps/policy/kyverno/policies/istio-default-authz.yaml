---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/generatingpolicy_v1.json
#
# One GeneratingPolicy per namespace rather than one policy with a branching
# CEL expression, so each generated AuthorizationPolicy is reviewable
# independently.
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-agents-default-allow
  annotations:
    policies.kyverno.io/title: Istio Ambient Default AuthorizationPolicy — agents
    policies.kyverno.io/category: Istio
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["agents"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "default-allow",
              "namespace": "agents"
            }),
            "spec": dyn({
              "rules": [
                {
                  "from": [
                    {"source": {"namespaces": ["agents", "network", "observability"]}}
                  ]
                }
              ]
            })
          }
        ]
  generate:
    - expression: "generator.Apply('agents', variables.downstream)"

---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-agents-allow-ingress
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — agents ingress exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Namespace-wide exception for envoy-internal (unmeshed, network
      namespace — see istio-authz-media-allow-ingress for why this is
      needed). agentgateway.darkflame.dev routes envoy-internal ->
      agentgateway-proxy:80; agentgateway-proxy then forwards internally
      to mcp-backend via its own agentgateway-class Gateway, entirely
      within agents, already covered by default-allow's
      source.namespaces list. Previously also carried ports 9092/15020
      (agentgateway's own metrics port, and Istio's per-pod stats endpoint
      that agentgateway-proxy exposes via prometheus.io/scrape=true) as a
      port-blanket workaround because observability wasn't enrolled yet.
      Now that it is, those are covered by "observability" being added to
      istio-authz-agents-default-allow's source.namespaces instead — real
      mesh-identity matching, not a blanket port exception — so only the
      genuinely-unmeshed network caller needs to stay here.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["agents"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-unmeshed-network-ingress",
              "namespace": "agents"
            }),
            "spec": dyn({
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["80"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('agents', variables.downstream)"

