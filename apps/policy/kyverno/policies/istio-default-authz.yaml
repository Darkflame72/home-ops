---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-observability-default-allow
  annotations:
    policies.kyverno.io/title: Istio Ambient Default AuthorizationPolicy — observability
    policies.kyverno.io/category: Istio
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["observability"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "default-allow",
              "namespace": "observability"
            }),
            "spec": dyn({
              "rules": [
                {
                  "from": [
                    {"source": {"namespaces": ["observability", "network", "agents"]}}
                  ]
                }
              ]
            })
          }
        ]
  generate:
    - expression: "generator.Apply('observability', variables.downstream)"

