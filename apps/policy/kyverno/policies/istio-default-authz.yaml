---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-default-allow-forgejo-runners
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — forgejo-runners exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Workload-scoped exception (no `from` clause) for forgejo-runners, an
      unmeshed namespace, calling forgejo's API in default. See the file
      header for the incident this fixed.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["default"]
  evaluation:
    synchronize:
      enabled: true
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-forgejo-runners",
              "namespace": "default"
            }),
            "spec": dyn({
              "selector": dyn({
                "matchLabels": {"app.kubernetes.io/name": "forgejo"}
              }),
              "rules": dyn([dyn({})])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('default', variables.downstream)"

