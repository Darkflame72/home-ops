---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-observability-allow-cnpg
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — observability CNPG exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Workload-scoped exception for the CNPG operator (unmeshed, database namespace) reaching its instance-manager API on port 8000 for any CNPG cluster in observability. Added proactively after the same gap caused a live outage in media on 2026-07-20 — see istio-ambient-namespace-labels.yaml.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["observability"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-cnpg-instance-manager",
              "namespace": "observability"
            }),
            "spec": dyn({
              "selector": dyn({
                "matchLabels": {"app.kubernetes.io/managed-by": "cloudnative-pg"}
              }),
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["8000"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('observability', variables.downstream)"

---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-observability-allow-ingress
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — observability ingress exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Namespace-wide exception for envoy-external/envoy-internal (both
      unmeshed, network namespace — see istio-authz-media-allow-ingress for
      why this is needed). envoy-external: gatus 80, grafana 3000, kromgo
      8080. envoy-internal: policy-reporter-ui 8080. Metrics scraping
      (gatus-postgres's exporter, kromgo's own metrics, mimir/loki
      memberlist gossip between their own pods) is NOT included here: the
      scraper (observability's own OTel collector) and every target here
      are all in observability itself, so once this namespace is meshed
      that traffic is covered by default-allow's self-referential
      source.namespaces=["observability", ...] via normal mesh-identity
      matching — no unmeshed-caller gap, unlike every other namespace in
      this rollout where the scraper lived elsewhere and wasn't meshed yet.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["observability"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-unmeshed-network-ingress",
              "namespace": "observability"
            }),
            "spec": dyn({
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["80", "3000", "8080"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('observability', variables.downstream)"

