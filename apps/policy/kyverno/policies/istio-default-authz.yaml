---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/generatingpolicy_v1.json
#
# One GeneratingPolicy per namespace rather than one policy with a branching
# CEL expression, so each generated AuthorizationPolicy is reviewable
# independently.
#
# An ALLOW AuthorizationPolicy switches a workload to implicit default-deny
# for anything unmatched, so no separate deny-all rule is needed.
# source.namespaces matching requires BOTH namespaces to be ambient-meshed —
# an unmeshed caller is denied even if listed by name. Callers that can't be
# meshed (e.g. kube-system, forgejo-runners) instead get a workload-scoped
# exception with no `from` clause, like the two below.
#
# CNPG-owning namespaces (comms, default, media, observability, security —
# every target namespace except agents) each also get an allow-cnpg exception:
# the CNPG operator lives unmeshed in "database" and polls every CNPG
# instance-manager's port 8000 cluster-wide, regardless of which namespace
# the Cluster lives in. Missing this caused a live ~4min outage of media's
# immich-v2 CNPG cluster on 2026-07-20 (operator's status polls got denied
# the moment media was meshed) — added proactively for the other four so
# the same incident doesn't repeat on their enrollment.
#
# The same "unmeshed caller listed by name still gets denied" gap also
# broke ingress: enrolling media caused two live outages on 2026-07-20 —
# https://photos.darkflame.dev (503s) and https://jelly.darkflame.dev
# (Gatus caught it) — because envoy-external/envoy-internal live in
# "network", which — like "database" — stays unmeshed indefinitely (see
# istio-ambient-namespace-labels.yaml). This is namespace-specific, not
# generic like the CNPG exception: each *-allow-ingress policy below was
# built by auditing that namespace's live HTTPRoutes/Services/ServiceMonitors
# (`kubectl get httproute -n <ns> -o jsonpath=...` cross-checked against
# `kubectl get svc` for port->targetPort, since ztunnel enforces on the
# container port, not the Service port) — comms/default/security were
# audited proactively before enrollment to avoid repeating the media
# incident. observability has NOT been audited yet as of 2026-07-20 — do
# this before adding it to the allow-list, don't assume it's fine because
# it's a monitoring namespace.
#
# synchronize:false + generateExisting:true (not the docs' recommended
# synchronize:true) — with sync on, the Namespace-kind trigger hits a Kyverno
# background-controller bug (create/delete loop, ~8/s, never converges; see
# upstream kyverno/kyverno#14317, #9406, #8061 for the same symptom class
# across versions). Verified fixed by this combo in isolation on 2026-07-20.
# Trade-off: the generated AuthorizationPolicy won't auto-update if these
# rules change, and won't auto-delete if the policy is deleted — both need
# manual cleanup (see istio-ambient-namespace-labels.yaml's rollback note).
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-agents-default-allow
  annotations:
    policies.kyverno.io/title: Istio Ambient Default AuthorizationPolicy — agents
    policies.kyverno.io/category: Istio
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["agents"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "default-allow",
              "namespace": "agents"
            }),
            "spec": dyn({
              "rules": [
                {
                  "from": [
                    {"source": {"namespaces": ["agents", "network"]}}
                  ]
                }
              ]
            })
          }
        ]
  generate:
    - expression: "generator.Apply('agents', variables.downstream)"

---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-agents-allow-ingress
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — agents ingress exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Namespace-wide exception for envoy-internal (unmeshed, network
      namespace — see istio-authz-media-allow-ingress for why this is
      needed). agentgateway.darkflame.dev routes envoy-internal ->
      agentgateway-proxy:80; agentgateway-proxy then forwards internally
      to mcp-backend via its own agentgateway-class Gateway, entirely
      within agents, already covered by default-allow's
      source.namespaces=["agents", "network"]. Port 9092 is agentgateway's
      (the controller, not the proxy) metrics port, scraped by the
      observability collector (also unmeshed, not yet enrolled) — same
      "no from clause" exception covers both unrelated unmeshed callers
      since ports don't overlap. Port 15020 is Istio's own per-pod
      stats/health endpoint, auto-exposed on every ambient-meshed pod;
      agentgateway-proxy carries prometheus.io/scrape=true (set by its
      chart, unlike other namespaces' apps which use ServiceMonitor CRDs
      instead of annotation-based discovery), so the OTel collector polls
      it directly — caught live after agents was enrolled. This exception
      is not superseded once observability joins the mesh: agents'
      default-allow source.namespaces is ["agents", "network"] only, it
      was never given "observability" like the other namespaces' policies
      were, so mesh-identity matching wouldn't cover this port anyway.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["agents"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-unmeshed-network-ingress",
              "namespace": "agents"
            }),
            "spec": dyn({
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["80", "9092", "15020"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('agents', variables.downstream)"

