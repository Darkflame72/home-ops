      Namespace-wide exception for envoy-external/envoy-internal (both
      unmeshed, network namespace — see istio-authz-media-allow-ingress for
      why this is needed). Ports: ghost-app 2368 and ghost-activitypub 8080
      (both envoy-external), gotosocial 8080 (envoy-external), phanpy 80
      (envoy-external), thelounge 9000 (envoy-internal). redbot has no
      HTTPRoute. Metrics for phanpy/gotosocial are scraped on the same
      ports as their http traffic, already covered here — no separate
      metrics exception needed for comms.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["comms"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-unmeshed-network-ingress",
              "namespace": "comms"
            }),
            "spec": dyn({
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["2368", "8080", "80", "9000"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('comms', variables.downstream)"

