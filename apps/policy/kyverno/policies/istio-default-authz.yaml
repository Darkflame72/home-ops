      Workload-scoped exception for the CNPG operator (unmeshed, database namespace) reaching its instance-manager API on port 8000 for any CNPG cluster in security. Added proactively after the same gap caused a live outage in media on 2026-07-20 — see istio-ambient-namespace-labels.yaml.
