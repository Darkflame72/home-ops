---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-security-allow-ingress
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — security ingress exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Namespace-wide exception for envoy-external (unmeshed, network
      namespace — see istio-authz-media-allow-ingress for why this is
      needed and why it's namespace-wide-by-port rather than
      workload-scoped). authentik-server listens on 9000 (http) and 9443
      (https, the Gateway backend port per its HTTPRoute); vaultwarden
      listens on 80 (http) and 3012 (websocket). Neither app has an
      envoy-internal route, unlike media's jellyfin, so envoy-internal
      isn't included here — add it if that changes.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["security"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-unmeshed-network-ingress",
              "namespace": "security"
            }),
            "spec": dyn({
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["9000", "9443", "80", "3012"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('security', variables.downstream)"

---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-security-allow-metrics-scrape
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — security metrics scrape exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Workload-scoped exception for the OTel/Prometheus collector
      (unmeshed, observability namespace — not yet enrolled) scraping:
      authentik-server's metrics port via its ServiceMonitor, and both
      CNPG clusters' built-in postgres-exporter sidecar (port 9187 — same
      gap as istio-authz-media-allow-metrics-scrape's immich-v2 entry,
      missed here initially and caught live after security was enrolled).
      The vaultwarden app itself has no metrics endpoint, only its CNPG
      cluster does.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["security"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-observability-scrape-authentik",
              "namespace": "security"
            }),
            "spec": dyn({
              "selector": dyn({
                "matchLabels": {
                  "app.kubernetes.io/name": "authentik",
                  "app.kubernetes.io/component": "server"
                }
              }),
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["9300"]}}
                ]
              })])
            })
          },
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-observability-scrape-cnpg-exporters",
              "namespace": "security"
            }),
            "spec": dyn({
              "selector": dyn({
                "matchLabels": {"app.kubernetes.io/managed-by": "cloudnative-pg"}
              }),
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["9187"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('security', variables.downstream)"
