---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-comms-allow-cnpg
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — comms CNPG exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Workload-scoped exception for the CNPG operator (unmeshed, database namespace, permanently out of scope) reaching its instance-manager API on port 8000 for any CNPG cluster in comms. Previously also carried port 9187 (the same pods' built-in postgres-exporter) as a port-blanket workaround for the observability collector before observability was enrolled — now that it is, that's covered by comms' default-allow already listing "observability" in source.namespaces (real mesh-identity matching), so only the permanently-unmeshed operator's port needs to stay here.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["comms"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-cnpg-instance-manager",
              "namespace": "comms"
            }),
            "spec": dyn({
              "selector": dyn({
                "matchLabels": {"app.kubernetes.io/managed-by": "cloudnative-pg"}
              }),
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["8000"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('comms', variables.downstream)"

---
apiVersion: policies.kyverno.io/v1
