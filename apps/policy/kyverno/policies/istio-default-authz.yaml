          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-observability-scrape-immich-server",
              "namespace": "media"
            }),
            "spec": dyn({
              "selector": dyn({
                "matchLabels": {
                  "app.kubernetes.io/instance": "immich",
                  "app.kubernetes.io/name": "server"
                }
              }),
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["8081", "8082"]}}
