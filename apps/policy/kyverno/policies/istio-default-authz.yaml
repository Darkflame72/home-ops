---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: istio-authz-media-allow-ingress
  annotations:
    policies.kyverno.io/title: Istio Ambient AuthorizationPolicy — media ingress exception
    policies.kyverno.io/category: Istio
    policies.kyverno.io/description: >-
      Namespace-wide (not workload-scoped — see below) exception for
      envoy-external and envoy-internal (both unmeshed, network namespace —
      network stays out of the mesh indefinitely, see
      istio-ambient-namespace-labels.yaml) reaching media's HTTP ports.
      Being listed in default-allow's source.namespaces is not enough: an
      unmeshed caller is denied even if listed by name. Missing this caused
      two live outages on 2026-07-20: photos.darkflame.dev (immich-server,
      Cloudflare-tunnel path via envoy-external) and jelly.darkflame.dev
      (jellyfin, LAN path via envoy-internal — Gatus caught this one, see
      apps/observability/gatus/config/config.yaml). Namespace-wide by ports
      rather than per-workload selector, because both ingress gateways can
      reach any HTTP-exposed workload in the namespace and enumerating
      every workload+port here is the same maintenance burden as just
      listing the ports; add new ports here as new workloads in media gain
      an envoy-internal/envoy-external route.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
        resourceNames: ["media"]
  evaluation:
    generateExisting:
      enabled: true
    synchronize:
      enabled: false
  variables:
    - name: downstream
      expression: >-
        [
          {
            "apiVersion": dyn("security.istio.io/v1"),
            "kind": dyn("AuthorizationPolicy"),
            "metadata": dyn({
              "name": "allow-unmeshed-network-ingress",
              "namespace": "media"
            }),
            "spec": dyn({
              "rules": dyn([dyn({
                "to": [
                  {"operation": {"ports": ["2283", "8096"]}}
                ]
              })])
            })
          }
        ]
  generate:
    - expression: "generator.Apply('media', variables.downstream)"

# istio-authz-media-allow-metrics-scrape (immich-server + immich-v2's
