---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./grafana-dashboard-generate.yaml
  - ./infra-exceptions.yaml
  # Re-enabling rollout one namespace at a time via the allow-list in
  # istio-ambient-namespace-labels.yaml. First attempt on 2026-07-20 hit a
  # Kyverno background-controller bug (GeneratingPolicy + synchronize:true +
  # Namespace-kind trigger loops create/delete indefinitely, ~8/s, never
  # converges — kyverno/kyverno#14317/#9406/#8061 are the same symptom class
  # in older versions). Isolated and fixed in istio-default-authz.yaml by
  # switching to synchronize:false + generateExisting:true, matching this
  # repo's own working grafana-dashboard-generate pattern above. See
  # istio-ambient-namespace-labels.yaml for full rollout history.
  - ./istio-ambient-namespace-labels.yaml
  - ./istio-default-authz.yaml
  - ./disallow-latest-tag.yaml
  - ./disallow-privileged-containers.yaml
  - ./require-image-registry-allowlist.yaml
  - ./require-requests-limits.yaml
  - ./require-run-as-nonroot.yaml
  - ./verify-image-signatures.yaml
