---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/validatingpolicy_v1.json
#
# Covers every container regardless of signing status, unlike
# verify-image-signatures.yaml which only covers publishers with a confirmed
# signing identity.
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-image-registry-allowlist
  annotations:
    policies.kyverno.io/title: Require Image Registry Allowlist
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Container images must come from an allowlisted registry, seeded from
      this cluster's actual live image inventory: ghcr.io, quay.io,
      docker.io, registry.k8s.io, reg.kyverno.io,
      registry.istio.io, mirror.gcr.io, ecr-public.aws.com,
      cr.agentgateway.dev, code.forgejo.org. Bare-name Docker Hub shorthand
      (e.g. "renovate/renovate:43", no explicit registry host) is allowed —
      it's already implicitly docker.io, which is already trusted; this
      cluster has 5 such images live (docker, grafana/mcp-grafana,
      otel/opentelemetry-collector-contrib, renovate/renovate,
      vaultwarden/server) and none should regress.
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validationActions:
    - Audit
  variables:
    - name: allowedRegistry
      expression: >-
        '^(ghcr\\.io|quay\\.io|docker\\.io|registry\\.k8s\\.io|reg\\.kyverno\\.io|registry\\.istio\\.io|mirror\\.gcr\\.io|ecr-public\\.aws\\.com|cr\\.agentgateway\\.dev|code\\.forgejo\\.org)/'
    - name: hasExplicitRegistry
      expression: "'^[^/]+[.:][^/]*/'"
  validations:
    - expression: >-
        object.spec.containers.all(c,
          c.image.matches(variables.allowedRegistry) || !c.image.matches(variables.hasExplicitRegistry))
        && object.spec.?initContainers.orValue([]).all(c,
          c.image.matches(variables.allowedRegistry) || !c.image.matches(variables.hasExplicitRegistry))
        && object.spec.?ephemeralContainers.orValue([]).all(c,
          c.image.matches(variables.allowedRegistry) || !c.image.matches(variables.hasExplicitRegistry))
      message: >-
        Container image must come from an allowlisted registry (ghcr.io,
        quay.io, docker.io, registry.k8s.io, reg.kyverno.io,
        registry.istio.io, mirror.gcr.io, ecr-public.aws.com,
        cr.agentgateway.dev, code.forgejo.org) or be an unprefixed Docker Hub
        shorthand image. Adding a new registry requires a PR.
