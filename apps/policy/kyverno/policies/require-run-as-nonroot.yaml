---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/policies.kyverno.io/validatingpolicy_v1.json
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-run-as-nonroot
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Containers must be required to run as non-root users. This policy
      ensures runAsNonRoot is set to `true`, either at the Pod level or on
      every container.
spec:
  validationActions:
    - Audit
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  variables:
    - name: allContainers
      expression: >-
        object.spec.containers + object.spec.?initContainers.orValue([]) +
        object.spec.?ephemeralContainers.orValue([])
  validations:
    - expression: >-
        (object.spec.?securityContext.?runAsNonRoot.orValue(false) == true
          && variables.allContainers.all(c, c.?securityContext.?runAsNonRoot.orValue(true) == true))
        || variables.allContainers.all(c, c.?securityContext.?runAsNonRoot.orValue(false) == true)
      message: >-
        Running as root is not allowed. Either the field
        spec.securityContext.runAsNonRoot must be set to `true`, or the
        fields spec.containers[*].securityContext.runAsNonRoot,
        spec.initContainers[*].securityContext.runAsNonRoot, and
        spec.ephemeralContainers[*].securityContext.runAsNonRoot must be
        set to `true`.
