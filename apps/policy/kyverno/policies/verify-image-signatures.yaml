    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies cosign KEY-BASED (not keyless) signatures on
      quay.io/jetstack/cert-manager-{controller,webhook,cainjector} — the
      only key-based entry in this file alongside cert-manager's own
      documented approach: the signing key is held in Google Cloud KMS by
      the cert-manager maintainers (not GitHub Actions OIDC), and the
      signatures are not logged to a public Rekor transparency log, so
      insecureIgnoreTlog is required (matching cert-manager's own
      documented `--insecure-ignore-tlog` verification command). Public key
      and exact command from
      https://cert-manager.io/docs/installation/code-signing/, confirmed
      empirically with `cosign verify --signature-digest-algorithm sha512
      --insecure-ignore-tlog --key <this key>` against this cluster's exact
      deployed tag (v1.21.0) on 2026-07-20.
