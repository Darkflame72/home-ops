---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/kyverno/main/config/crds/policies.kyverno.io/v1/imagevalidatingpolicies.yaml
#
# CEL-based ImageValidatingPolicy, not the legacy kyverno.io/v1 ClusterPolicy —
# ClusterPolicy/CleanupPolicy were deprecated in Kyverno 1.17 and are scheduled
# for removal in v1.20 (Oct 2026), so new verifyImages work goes here instead.
#
# One ImageValidatingPolicy per publisher, each with exactly one attestor, on
# purpose: combining several publishers' attestors into a single verifyImageSignatures()
# call is ambiguous about AND-vs-OR semantics from the docs alone, and each
# publisher's identity gets confirmed (and promoted to Deny) independently anyway.
# Add a new ImageValidatingPolicy here per publisher only once its signing
# identity is confirmed against that publisher's own docs — never a wildcard
# subject (e.g. "https://github.com/*"), since that accepts a signature from any
# GitHub repo, including an attacker's fork.
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures-cilium
  annotations:
    policies.kyverno.io/title: Verify Cilium Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies cosign keyless signatures on quay.io/cilium/cilium, confirmed
      against https://docs.cilium.io/en/stable/configuration/verify-image-signatures/
      on 2026-07-19. Audit only — see the promotion note below before ever
      switching validationActions to Deny.
spec:
  failurePolicy: Ignore # a Sigstore/Rekor outage must not block all pod admission
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "quay.io/cilium/cilium:*"
  validationActions:
    - Audit
  attestors:
    - name: cilium
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subject: "https://github.com/cilium/cilium/.github/workflows/build-images-releases.yaml@refs/tags/*"
  validations:
    - expression: >-
        images.containers.map(image,
        verifyImageSignatures(image, [attestors.cilium])).all(e, e > 0)
      message: >-
        quay.io/cilium/cilium image signature could not be verified against
        Cilium's published GitHub Actions identity.

---
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures-k8s
  annotations:
    policies.kyverno.io/title: Verify Kubernetes Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies cosign keyless signatures on registry.k8s.io images. Kubernetes
      has signed release images since v1.24, confirmed against
      https://kubernetes.io/docs/tasks/administer-cluster/verify-signed-artifacts/
      on 2026-07-19. Audit only — see the promotion note below before ever
      switching validationActions to Deny.
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "registry.k8s.io/*"
  validationActions:
    - Audit
  attestors:
    - name: k8s
      cosign:
        keyless:
          identities:
            - issuer: "https://accounts.google.com"
              subject: "krel-trust@k8s-releng-prod.iam.gserviceaccount.com"
  validations:
    - expression: >-
        images.containers.map(image,
        verifyImageSignatures(image, [attestors.k8s])).all(e, e > 0)
      message: >-
        registry.k8s.io image signature could not be verified against the
        Kubernetes release identity.
