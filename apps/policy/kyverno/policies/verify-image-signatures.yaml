apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures-kyverno
  annotations:
    policies.kyverno.io/title: Verify Kyverno Image Attestations
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies a cosign SLSA provenance ATTESTATION (not a plain signature —
      reg.kyverno.io/kyverno/* carries no plain cosign signature at all,
      confirmed empirically with `cosign verify`, which fails with "no
      signatures found") on all six reg.kyverno.io/kyverno/* component
      images. The attestation's builder identity is the third-party
      slsa-framework/slsa-github-generator reusable workflow, pinned to
      v2.1.0 — Kyverno's own release.yaml invokes that trusted SLSA3
      builder rather than signing with its own workflow identity, which is
      the SLSA3 build model working as intended (the builder identity is
      fixed and audited, independent of what the calling repo's workflow
      does). Confirmed empirically with `cosign verify-attestation --type
      slsaprovenance` against reg.kyverno.io/kyverno/{kyverno,
      background-controller,cleanup-controller,reports-controller,
      kyvernopre,kyverno-cli}:v1.18.2 on 2026-07-20; all six share this
      identity. If Kyverno ever bumps its pinned slsa-github-generator
      version, this identity needs re-confirming.
spec:
  failurePolicy: Ignore # a Sigstore/Rekor outage must not block all pod admission
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "reg.kyverno.io/kyverno/*"
  validationActions:
    - Audit
  attestors:
    - name: kyverno
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/slsa-framework/slsa-github-generator/\\.github/workflows/generator_container_slsa3\\.yml@refs/tags/v.*$"
  attestations:
    - name: provenance
      intoto:
        type: "https://slsa.dev/provenance/v0.2"
  validations:
    - expression: >-
        images.containers.map(image,
        verifyAttestationSignatures(image, "provenance", [attestors.kyverno])).all(e, e > 0)
      message: >-
        reg.kyverno.io/kyverno image SLSA provenance attestation could not
        be verified against the slsa-github-generator builder identity.

