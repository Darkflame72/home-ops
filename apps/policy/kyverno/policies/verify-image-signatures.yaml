---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/imagevalidatingpolicy_v1.json
#
# One ImageValidatingPolicy per publisher, one attestor each (combining
# attestors into a single verifyImageSignatures() call is ambiguous about
# AND-vs-OR semantics). Never use a wildcard subject (e.g.
# "https://github.com/*") — that accepts a signature from any GitHub repo,
# including an attacker's fork.
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures-cilium
  annotations:
    policies.kyverno.io/title: Verify Cilium Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies cosign keyless signatures on quay.io/cilium/cilium against
      Cilium's published GitHub Actions identity.
spec:
  failurePolicy: Ignore # a Sigstore/Rekor outage must not block all pod admission
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "quay.io/cilium/cilium:*"
  validationActions:
    - Audit
  attestors:
    - name: cilium
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/cilium/cilium/\\.github/workflows/build-images-releases\\.yaml@refs/tags/.*$"
  validations:
    - expression: >-
        images.containers.map(image,
        verifyImageSignatures(image, [attestors.cilium])).all(e, e > 0)
      message: >-
        quay.io/cilium/cilium image signature could not be verified against
        Cilium's published GitHub Actions identity.

---
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures-k8s
  annotations:
    policies.kyverno.io/title: Verify Kubernetes Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies cosign keyless signatures on the core Kubernetes control-plane
      images against the Kubernetes release identity. Scoped to the three
      exact control-plane binaries rather than "registry.k8s.io/*" —
      Kyverno's glob crosses "/" (confirmed against
      github.com/kyverno/kyverno's own pkg/cel/matching/image_test.go, where
      "ghcr.io/*" matches "ghcr.io/kyverno/kyverno"), so a bare
      "registry.k8s.io/*" would also match sig-storage/kube-state-metrics/
      external-dns/descheduler/metrics-server images, none of which are
      cosign-signed at all (confirmed on 2026-07-20 via GitHub code search
      returning zero cosign references across kubernetes-csi/*,
      kubernetes-sigs/external-dns, kubernetes-sigs/descheduler,
      kubernetes/kube-state-metrics, kubernetes-sigs/metrics-server — they
      ship via the Prow/k8s-infra Cloud Build image-promotion pipeline,
      which has no signing step). Matching them against the krel-trust
      identity would just be a permanent, meaningless failure.
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "registry.k8s.io/kube-apiserver:*"
    - glob: "registry.k8s.io/kube-controller-manager:*"
    - glob: "registry.k8s.io/kube-scheduler:*"
  validationActions:
    - Audit
  attestors:
    - name: k8s
      cosign:
        keyless:
          identities:
            - issuer: "https://accounts.google.com"
              subject: "krel-trust@k8s-releng-prod.iam.gserviceaccount.com"
  validations:
    - expression: >-
        images.containers.map(image,
        verifyImageSignatures(image, [attestors.k8s])).all(e, e > 0)
      message: >-
        registry.k8s.io image signature could not be verified against the
        Kubernetes release identity.

