---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/imagevalidatingpolicy_v1.json
#
# One ImageValidatingPolicy per publisher, one attestor each (combining
# attestors into a single verifyImageSignatures() call is ambiguous about
# AND-vs-OR semantics). Never use a wildcard subject (e.g.
# "https://github.com/*") — that accepts a signature from any GitHub repo,
# including an attacker's fork.
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures-cilium
  annotations:
    policies.kyverno.io/title: Verify Cilium Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies cosign keyless signatures on quay.io/cilium/cilium against
      Cilium's published GitHub Actions identity.
spec:
  failurePolicy: Ignore # a Sigstore/Rekor outage must not block all pod admission
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "quay.io/cilium/cilium:*"
  validationActions:
    - Audit
  attestors:
    - name: cilium
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/cilium/cilium/\\.github/workflows/build-images-releases\\.yaml@refs/tags/.*$"
  validations:
    - expression: >-
        images.containers.map(image,
        verifyImageSignatures(image, [attestors.cilium])).all(e, e > 0)
      message: >-
        quay.io/cilium/cilium image signature could not be verified against
        Cilium's published GitHub Actions identity.

---
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-image-signatures-k8s
  annotations:
    policies.kyverno.io/title: Verify Kubernetes Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Verifies cosign keyless signatures on registry.k8s.io images against
      the Kubernetes release identity.
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchImageReferences:
    - glob: "registry.k8s.io/*"
  validationActions:
    - Audit
  attestors:
    - name: k8s
      cosign:
        keyless:
          identities:
            - issuer: "https://accounts.google.com"
              subject: "krel-trust@k8s-releng-prod.iam.gserviceaccount.com"
  validations:
    - expression: >-
        images.containers.map(image,
        verifyImageSignatures(image, [attestors.k8s])).all(e, e > 0)
      message: >-
        registry.k8s.io image signature could not be verified against the
        Kubernetes release identity.
