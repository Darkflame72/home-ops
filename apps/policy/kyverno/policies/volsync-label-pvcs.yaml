---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-label-pvcs
  annotations:
    policies.kyverno.io/title: VolSync Label Helm-managed PVCs
    policies.kyverno.io/category: VolSync
    policies.kyverno.io/description: >-
      Adds volsync.io/backup=true to PVCs created by Helm charts or StatefulSets
      that cannot be labeled via their pvc.yaml. Add annotations here to override
      backup schedule, cache size, or security context per PVC.
spec:
  admission: true
  emitWarning: false
  rules:
  - name: label-forgejo
    match:
      any:
      - resources:
          kinds: [PersistentVolumeClaim]
          names: [forgejo]
          namespaces: [default]
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            volsync.io/backup: "true"
  - name: label-immich-machine-learning
    match:
      any:
      - resources:
          kinds: [PersistentVolumeClaim]
          names: [immich-machine-learning]
          namespaces: [media]
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            volsync.io/backup: "true"
          annotations:
            volsync.io/schedule: "0 3 * * *"
  - name: label-config-gatus-0
    match:
      any:
      - resources:
          kinds: [PersistentVolumeClaim]
          names: [config-gatus-0]
          namespaces: [observability]
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            volsync.io/backup: "true"
