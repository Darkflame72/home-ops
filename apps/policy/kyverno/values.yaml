reportsServer:
  enabled: true

grafana:
  enabled: true

admissionController:
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - volsync.backube
          resources:
            - replicationsources
            - replicationdestinations
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - postgresql.cnpg.io
          resources:
            - scheduledbackups
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - grafana.integreatly.org
          resources:
            - grafanadashboards
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch

