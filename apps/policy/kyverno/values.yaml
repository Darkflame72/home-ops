# No yaml-language-server schema available: kyverno/kyverno (no values.schema.json)
features:
  policyExceptions:
    enabled: true
    # Restrict to the policy namespace so exceptions stay reviewable in one
    # place rather than any namespace being able to opt itself out of rules.
    namespace: policy
  backgroundScan:
    # Default of 2 workers churning through 22 image-signature policies plus
    # the rest of the ruleset across every resource in the cluster caused
    # intermittent "policy not evaluated" false-fail results (confirmed
    # 2026-07-20: policies whose matchImageReferences didn't even match the
    # resource's image, e.g. verify-image-signatures-dex against
    # kopia-primary-kopia-ui, which only runs a kopiur-mover image) —
    # background scan contention, not a real signature failure.
    backgroundScanWorkers: 6

reportsServer:
  enabled: false

grafana:
  enabled: true

admissionController:
  serviceMonitor:
    enabled: true
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - postgresql.cnpg.io
          resources:
            - scheduledbackups
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - postgresql.cnpg.io
          resources:
            - clusters
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - grafana.integreatly.org
          resources:
            - grafanadashboards
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - security.istio.io
          resources:
            - authorizationpolicies
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - ""
          resources:
            - namespaces
          verbs:
            - get
            - list
            - patch
            - update
            - watch

backgroundController:
  serviceMonitor:
    enabled: true
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - postgresql.cnpg.io
          resources:
            - scheduledbackups
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - postgresql.cnpg.io
          resources:
            - clusters
          verbs:
            - get
            - list
            - watch
        - apiGroups:
            - grafana.integreatly.org
          resources:
            - grafanadashboards
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - security.istio.io
          resources:
            - authorizationpolicies
          verbs:
            - create
            - delete
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - ""
          resources:
            - namespaces
          verbs:
            - get
            - list
            - patch
            - update
            - watch

cleanupController:
  serviceMonitor:
    enabled: true

reportsController:
  serviceMonitor:
    enabled: true
  resources:
    # Chart default (128Mi limit) OOMKilled once after adding 4 more active
    # CEL background-scan policies (2026-07-19); bumped to 512Mi. Now
    # OOMKilling again (6 restarts/13h, observed exitCode 137) with ~22
    # verify-image-signatures-* ImageValidatingPolicies added since —
    # each background-scan cycle does cosign/Rekor verification per image
    # per policy across every pod in the cluster. Crashes mid-cycle leave
    # stale/incomplete PolicyReport results until the next full rescan.
    limits:
      memory: 1Gi
    requests:
      cpu: 150m
      memory: 256Mi
