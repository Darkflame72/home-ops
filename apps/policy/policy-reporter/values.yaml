resources:
  requests:
    cpu: 15m
    memory: 64Mi
  limits:
    memory: 256Mi

ui:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

monitoring:
  enabled: true
  grafana:
    grafanaDashboard:
      enabled: true
      matchLabels:
        dashboards: null
        grafana.internal/instance: grafana
