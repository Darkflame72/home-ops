# No yaml-language-server schema available: kyverno/policy-reporter (no values.schema.json)
target:
  alertManager:
    # Mimir's embedded Alertmanager serves its API under /alertmanager, not root.
    # Reuses the existing Discord routing in apps/observability/mimir/values.yaml
    # (severity=critical -> discord-critical, else -> discord) instead of a
    # second, separate Discord webhook integration.
    host: http://mimir-alertmanager.observability.svc.cluster.local:8080/alertmanager
    minimumSeverity: medium

# Chart default only excludes ReplicaSet (Deployment->ReplicaSet->Pod chains).
# CronJob->Job->Pod chains weren't covered, so every CronJob run's own Job and
# Pod generated their own separate, alertable reports on top of the CronJob's
# own autogen'd report — one-shot noise for a workload that's already gone by
# the time anyone could act on it. Explicitly exclude Job and Pod too so only
# the top-level controller (Deployment/DaemonSet/StatefulSet/CronJob) reports.
sourceFilters:
  - selector:
      sources: [kyverno, KyvernoValidatingPolicy, KyvernoImageValidatingPolicy]
    uncontrolledOnly: true
    kinds:
      exclude: [ReplicaSet, Job, Pod]

resources:
  requests:
    cpu: 15m
    memory: 64Mi
  limits:
    memory: 256Mi

ui:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

monitoring:
  enabled: true
  grafana:
    grafanaDashboard:
      enabled: true
      matchLabels:
        dashboards: null
        grafana.internal/instance: grafana
