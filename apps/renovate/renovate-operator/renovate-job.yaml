# No yaml-language-server schema available: mogenius/renovate-operator (no schema published)
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: forgejo
spec:
  schedule: "0 3 * * *"
  image: renovate/renovate:43.255.0
  secretRef: renovate-secret
  parallelism: 1
  provider:
    name: forgejo
    endpoint: "https://git.darkflame.dev/api/v1"
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-secret
        key: token
    # Automatically create/remove the webhook on every discovered Forgejo repo
    # each discovery cycle. Uses RENOVATE_TOKEN from spec.secretRef, so the bot
    # account needs admin (not just push) permission on the repos.
    sync:
      enabled: true
