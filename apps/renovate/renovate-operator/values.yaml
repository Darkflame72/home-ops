# No yaml-language-server schema available: mogenius/renovate-operator (no schema published)
crd:
  install: true
  mode: template
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 256Mi
route:
  enabled: true
  annotations:
    gatus.home-operations.com/enabled: "false"
  hostnames:
    - renovate.darkflame.dev
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-internal
      namespace: network
      sectionName: https
webhook:
  enabled: true
  # Serve the webhook receiver on the UI host (renovate.darkflame.dev/webhook/...)
  # instead of a dedicated hostname; /webhook paths are exempt from OIDC auth.
  unifiedWebhookHost: true
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  dashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
    grafanaDashboard:
      allowCrossNamespaceImport: true
      instanceSelector:
        matchLabels:
          grafana.internal/instance: grafana
auth:
  # Only members of this Authentik group can see/manage RenovateJobs in the UI (secure by default).
  defaultAllowedGroups: "authentik Admins"
  oidc:
    enabled: true
    issuerUrl: "https://auth.darkflame.dev/application/o/renovate/"
    # Set after creating the OAuth2 provider/application in Authentik (not secret, safe to commit).
    clientId: "5QCqRHGc0shjhX8raHtX2kyXajIOYStF7ST943j3"
    existingSecret: renovate-secret
    secretKey: client-secret
    # The chart derives the redirect host from route.hostnames[0] but the scheme from
    # ingress.tls, which is unset since TLS terminates at the Gateway (envoy-internal).
    redirectScheme: https
