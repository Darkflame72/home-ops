# No yaml-language-server schema available: mogenius/renovate-operator (no schema published)
crd:
  install: true
  mode: template
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 256Mi
route:
  enabled: true
  hostnames:
    - renovate.darkflame.dev
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-internal
      namespace: network
      sectionName: https
auth:
  # Only members of this Authentik group can see/manage RenovateJobs in the UI (secure by default).
  defaultAllowedGroups: "authentik Admins"
  oidc:
    enabled: true
    issuerUrl: "https://auth.darkflame.dev/application/o/renovate/"
    # Set after creating the OAuth2 provider/application in Authentik (not secret, safe to commit).
    clientId: "5QCqRHGc0shjhX8raHtX2kyXajIOYStF7ST943j3"
    existingSecret: renovate-secret
    secretKey: client-secret
    # Set explicitly: the pinned chart version (4.14.1) only derives scheme from ingress.tls,
    # which is unset since we expose via a Gateway API HTTPRoute (envoy-internal), not an ingress.
    # redirectScheme would fix this on a newer chart release but isn't supported yet in 4.14.1.
    redirectUrl: "https://renovate.darkflame.dev/auth/callback"
