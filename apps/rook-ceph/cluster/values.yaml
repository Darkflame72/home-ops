# No yaml-language-server schema available: rook/rook-ceph-cluster (no values.schema.json)
monitoring:
  enabled: true
  # Rules are vendored in ./prometheus-rules.yaml with a local tweak (see that file's header) so the
  # chart's copy is disabled here to avoid a duplicate/conflicting PrometheusRule resource.
  createPrometheusRules: false
toolbox:
  enabled: true
route:
  dashboard:
    annotations:
      gatus.home-operations.com/enabled: "false"
    host:
      name: rook.darkflame.dev
      path: /
      pathType: PathPrefix
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: envoy-internal
        namespace: network
    rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: rook-ceph-mgr-dashboard
          port: 7000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
cephClusterSpec:
  cephConfig:
    global:
      bdev_enable_discard: "true" # quote
      bdev_async_discard_threads: "1" # quote
      osd_class_update_on_start: "false" # quote
      device_failure_prediction_mode: local # requires mgr module
      mon_data_avail_warn: "15"
  cleanupPolicy:
    wipeDevicesFromOtherClusters: true
  crashCollector:
    disable: false
  csi:
    readAffinity:
      enabled: true
  dashboard:
    enabled: true
    urlPrefix: /
    ssl: false
    prometheusEndpoint: http://mimir-gateway.observability.svc.cluster.local/prometheus
  mgr:
    modules:
      - name: diskprediction_local
        enabled: true
      - name: insights
        enabled: true
      - name: pg_autoscaler
        enabled: true
      - name: rook
        enabled: true
  network:
    provider: host
    connections:
      requireMsgr2: true
  resources:
    osd:
      limits:
        memory: 8Gi
    prepareosd:
      requests:
        cpu: 500m
        memory: 50Mi
      limits:
        memory: 1Gi
  storage:
    useAllNodes: true
    useAllDevices: false
    devicePathFilter: /dev/disk/by-id/nvme-WD_Green_SN3000_1TB_*
    config:
      osdsPerDevice: "1"
cephBlockPools:
  - name: ceph-blockpool
    spec:
      failureDomain: host
      replicated:
        size: 3
    storageClass:
      enabled: true
      name: ceph-block
      isDefault: true
      reclaimPolicy: Retain
      allowVolumeExpansion: true
      volumeBindingMode: Immediate
      mountOptions:
        - discard
      parameters:
        compression_mode: aggressive
        compression_algorithm: zstd
        imageFormat: "2"
        imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
        csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/fstype: ext4
cephBlockPoolsVolumeSnapshotClass:
  enabled: true
  name: csi-ceph-blockpool
  isDefault: false
  deletionPolicy: Delete
# CephFS (cephFileSystems / cephFileSystemVolumeSnapshotClass) intentionally removed:
# nothing used it (zero PVCs on the ceph-filesystem StorageClass, no real subvolume
# data), and its metadata/data pool IDs had somehow shifted to overlap with
# ceph-blockpool's pool ID — which unconditionally blocks RBD self-managed snapshots
# on any pool the FSMap considers CephFS-attached (OSDMonitor::prepare_pool_op).
# See docs/ceph-blockpool-migration.md for the full investigation.
cephObjectStores:
  - name: ceph-objectstore
    spec:
      metadataPool:
        failureDomain: host
        replicated:
          size: 3
      dataPool:
        failureDomain: host
        replicated:
          size: 3
      preservePoolsOnDelete: true
      gateway:
        port: 80
        instances: 1
        resources:
          requests:
            cpu: 35m
            memory: 576Mi
          limits:
            memory: 2304Mi
    storageClass:
      enabled: true
      name: ceph-bucket
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
