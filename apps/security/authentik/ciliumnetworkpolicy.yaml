---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
#
# Same default-deny-egress pattern as agents/ciliumnetworkpolicy.yaml.
# authentik and vaultwarden both use smtp-relay.default.svc.cluster.local
# for email — in-cluster, already covered by the "cluster" entity below,
# not an external dependency. vaultwarden's icon/favicon fetching (hits
# arbitrary external domains per saved login, cosmetic only) is disabled
# via DISABLE_ICON_DOWNLOAD in vaultwarden/values.yaml rather than left to
# silently fail here. No other external dependency found for either app.
# DNS rule's rules.dns block is required for any future toFQDNs entry to
# work at all — see observability/ciliumnetworkpolicy.yaml.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: security-egress-default-deny
  namespace: security
spec:
  endpointSelector: {}
  enableDefaultDeny:
    egress: true
    ingress: false
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - cluster
        - kube-apiserver
