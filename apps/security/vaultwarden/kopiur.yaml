# Migrated from VolSync (perfectra1n fork) via `kopiur migrate volsync`.
# identity is pinned to vaultwarden@security:/data so history continues under kopiur.
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: vaultwarden
  namespace: security
spec:
  compression:
    compressor: zstd-fastest
  copyMethod: Snapshot
  defaultDeletionPolicy: Delete
  groupBy: VolumeGroupSnapshot
  identity:
    hostname: security
    username: vaultwarden
  mover:
    cache:
      capacity: 5Gi
      storageClassName: openebs-hostpath
    podSecurityContext:
      fsGroup: 1000
      runAsGroup: 1000
      runAsUser: 1000
  repository:
    kind: ClusterRepository
    name: kopia-primary
  retention:
    keepDaily: 7
    keepHourly: 24
  sources:
  - pvc:
      name: vaultwarden
    sourcePathOverride: /data
    sourcePathStrategy: PvcName
  upload:
    maxParallelFileReads: 2
  volumeSnapshotClassName: csi-ceph-blockpool
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: vaultwarden
  namespace: security
spec:
  policyRef:
    name: vaultwarden
  schedule:
    cron: 0 * * * *
