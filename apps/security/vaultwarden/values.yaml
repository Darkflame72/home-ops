# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  vaultwarden:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    containers:
      app:
        image:
          repository: vaultwarden/server
          tag: 1.36.0@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c
        env:
          - name: DOMAIN
            value: "https://vw.darkflame.dev"
          - name: TZ
            value: "Pacific/Auckland"
          - name: SIGNUPS_ALLOWED
            value: "false"
          - name: WEBSOCKET_ENABLED
            value: "true"
          # Icon fetching hits arbitrary external domains (whatever site a
          # saved login is for) — cosmetic only, disabled to keep security's
          # egress bounded to known destinations (see ciliumnetworkpolicy.yaml).
          - name: DISABLE_ICON_DOWNLOAD
            value: "true"
          - name: SMTP_HOST
            value: smtp-relay.default.svc.cluster.local
          - name: SMTP_FROM
            value: noreply@darkflame.dev
          - name: SMTP_FROM_NAME
            value: Vaultwarden
          - name: SMTP_PORT
            value: "25"
          - name: SMTP_SECURITY
            value: "off"
          - name: SIGNUPS_VERIFY
            value: "true"
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: vaultwarden-postgres-app
                key: uri
        envFrom:
          - secretRef:
              name: vaultwarden-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            memory: 500Mi
service:
  app:
    ports:
      http:
        port: 80
      websocket:
        enabled: true
        port: 3012
route:
  app:
    hostnames:
      - "vw.darkflame.dev"
    parentRefs:
      - name: envoy-external
        namespace: network
    rules:
      - backendRefs:
          - name: vaultwarden
            port: 80
        matches:
          - path:
              type: PathPrefix
              value: /
persistence:
  config:
    existingClaim: vaultwarden
    globalMounts:
      - path: /data
