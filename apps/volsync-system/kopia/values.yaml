# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  kopia:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/kopia
          tag: 0.23.1@sha256:27da0a33b44e1b902150a6c963514237217464bb13118a95bb056667be93cda5
        env:
          KOPIA_WEB_ENABLED: true
          KOPIA_WEB_PORT: &port 80
          TZ: Pacific/Auckland
        envFrom:
          - secretRef:
              name: volsync-s3-secret
        args:
          - --without-password
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 1Gi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
service:
  app:
    ports:
      http:
        port: *port
route:
  app:
    hostnames:
      - "{{ .Release.Name }}.darkflame.dev"
    parentRefs:
      - name: envoy-internal
        namespace: network
    rules:
      - backendRefs:
          - name: kopia
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /
configMaps:
  config:
    data:
      repository.config: |-
        {
          "storage": {
            "type": "s3",
            "config": {
              "bucket": "kopia",
              "endpoint": "10.0.60.15:30188",
              "region": "garage",
              "doNotUseTLS": true
            }
          },
          "hostname": "volsync.{{ .Release.Namespace }}.svc.cluster.local",
          "username": "volsync",
          "description": "volsync",
          "enableActions": false
        }
persistence:
  config-file:
    type: configMap
    identifier: config
    globalMounts:
      - path: /config/repository.config
        subPath: repository.config
  tmpfs:
    type: emptyDir
    advancedMounts:
      kopia:
        app:
          - path: /config/cache
            subPath: cache
          - path: /config/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
