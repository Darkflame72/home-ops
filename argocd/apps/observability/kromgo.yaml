---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kromgo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: default
  sources:
    - repoURL: "https://github.com/Darkflame72/home-ops.git"
      path: apps/observability/kromgo
      targetRevision: main
      ref: repo
    - repoURL: ghcr.io/home-operations/charts
      chart: kromgo
      targetRevision: 0.15.0
      helm:
        releaseName: kromgo
        valueFiles:
          - $repo/apps/observability/kromgo/values.yaml
  destination:
    name: in-cluster
    namespace: observability
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
