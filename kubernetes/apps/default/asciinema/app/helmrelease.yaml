---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app asciinema
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  dependsOn:
    - name: authentik
      namespace: security
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
         01-init-db:
           image:
            repository: ghcr.io/onedr0p/postgres-init
            tag: 16.6@sha256:35353a77777ee8f634d0f3945f495b4a40065134b8619e0d18bd49b0ee9c855b
           envFrom:
             - secretRef:
                 name: asciinema-init-secret
        containers:
          main:
            image:
              repository: ghcr.io/asciinema/asciinema
              tag: alpine
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 600Mi
            env:
              HOME: /data/config
              SIGN_UP_DISABLED: false
              SMTP_HOST: smtp-relay.default.svc.cluster.local
            envFrom:
              - secretRef:
                  name: asciinema-secret
    service:
      main:
        ports:
          http:
            port: 4000
    ingress:
      main:
        className: internal

        hosts:
          - host: asciinema.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
                  port: http
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /var/opt/asciinema
