# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app asciinema
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 3.5.1
  dependsOn:
    - name: authentik
      namespace: security
  values:
    controllers:
      main:
        initContainers:
         01-init-db:
           image:
            repository: ghcr.io/onedr0p/postgres-init
            tag: 16.6@sha256:35353a77777ee8f634d0f3945f495b4a40065134b8619e0d18bd49b0ee9c855b
           envFrom:
             - secretRef:
                 name: asciinema-init-secret
        containers:
          app:
            image:
              repository: ghcr.io/asciinema/asciinema
              tag: alpine
            env:
              HOME: /data/config
              SIGN_UP_DISABLED: false
              SMTP_HOST: smtp-relay.default.svc.cluster.local
            envFrom:
              - secretRef:
                  name: asciinema-secret
    ingress:
      app:
        className: internal
        hosts:
        - host: asciinema.${SECRET_DOMAIN}
          paths:
          - path: /
            service:
              identifier: app
              port: http
    service:
      app:
        controller: asciinema
        ports:
          http:
            port: 4000
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /var/opt/asciinema
