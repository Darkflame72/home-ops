---
# yaml-language-server: $schema=https://kubernetes-schemas.18b.haus/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 2h
  chart:
    spec:
      chart: forgejo
      version: 8.2.2
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    strategy:
      type: Recreate
    ingress:
      enabled: true
      className: external
      annotations:
        external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        nginx.ingress.kubernetes.io/server-snippet: |
          # Do not expose metrics to the outside.
          location = /metrics {
            return 404;
          }
      hosts:
        - host: &host git.${SECRET_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host
    persistence:
      enabled: true
      create: false
      claimName: forgejo
    redis-cluster:
      enabled: true
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false

      initContainers:
          01-init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16.3
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: forgejo-db-secret

    gitea:
      admin:
        existingSecret: forgejo-admin-secret
      config:
        actions:
          ENABLED: false
        database:
          DB_TYPE: postgres
          SSL_MODE: require
        repository:
          DEFAULT_PRIVATE: private
        storage:
          STORAGE_TYPE: minio
          MINIO_ENDPOINT: minio.default.svc.cluster.local
          MINIO_BUCKET: forgejo
          MINIO_USE_SSL: true
        webhook:
          ALLOWED_HOST_LIST: private
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true

  valuesFrom:
    - kind: Secret
      name: &dbSecret forgejo-db-secret
      valuesKey: INIT_POSTGRES_HOST
      targetPath: gitea.config.database.HOST
    - kind: Secret
      name: *dbSecret
      valuesKey: INIT_POSTGRES_DBNAME
      targetPath: gitea.config.database.NAME
    - kind: Secret
      name: *dbSecret
      valuesKey: INIT_POSTGRES_USER
      targetPath: gitea.config.database.USER
    - kind: Secret
      name: *dbSecret
      valuesKey: INIT_POSTGRES_PASS
      targetPath: gitea.config.database.PASSWD
    - kind: Secret
      name: &secret forgejo-secret
      valuesKey: SECRET_KEY
      targetPath: gitea.config.security.SECRET_KEY
    - kind: Secret
      name: *secret
      valuesKey: MINIO_ACCESS_KEY
      targetPath: gitea.config.storage.MINIO_ACCESS_KEY_ID
    - kind: Secret
      name: *secret
      valuesKey: MINIO_SECRET_KEY
      targetPath: gitea.config.storage.MINIO_SECRET_ACCESS_KEY
