---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: littlelink
spec:
  interval: 30m
  releaseName: littlelink
  chart:
    spec:
      chart: app-template
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/techno-tim/littlelink-server
              tag: latest@sha256:42917c3ef616a679e637faf78b69231f815d57b6ab1fada06f2fb09f67c504e1
            env:
              TZ: ${TIMEZONE}
              META_TITLE: Leon Bowie
              META_DESCRIPTION: Leon Bowie Link Page
              META_AUTHOR: Leon Bowie
              THEME: Dark
              BIO: "Software Developer / Hacker / Educator"
              BUTTON_ORDER: Website,FORGEJO,MATRIX,MASTODON,GITHUB
              GITHUB: https://github.com/Darkflame72
              FORGEJO: https://git.darkflame.dev
              MATRIX: https://matrix.to/#/@darkflame72:darkflame.dev
              MASTODON: https://mastodon.darkflame.dev/@darkflame
              EMAIL: leon@darkflame.dev
              EMAIL_TEXT: Email me!
              FOOTER: Leon Bowie © 2024-Present
            resources:
              requests:
                memory: 64M
              limits:
                memory: 100M
    service:
      main:
        ports:
          http:
            port: 3000
    ingress:
      app:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hosts:
          - host: &host links.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: *host
