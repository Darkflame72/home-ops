---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft
spec:
  chart:
    spec:
      chart: minecraft
      version: 4.23.3
      sourceRef:
        kind: HelmRepository
        name: minecraft-server
        namespace: flux-system
  interval: 30m
  values:
    image:
      repository: itzg/minecraft-server
      tag: 2024.12.0-java21
    resources:
      limits:
        memory: 4000Mi
      requests:
        cpu: 1000m
        memory: 2000Mi
    securityContext:
      runAsUser: 568
      fsGroup: 568
    livenessProbe:
      initialDelaySeconds: 0
    readinessProbe:
      initialDelaySeconds: 0
    startupProbe:
      enabled: true
    extraEnv:
      TZ: "${TIMEZONE}"
      ENABLE_ROLLING_LOGS: true
      MEMORY: ""
    persistence:
      dataDir:
        enabled: true
        existingClaim: *app
    serviceAnnotations:
      lbipam.cilium.io/ips: "10.0.60.16"
    minecraftServer:
      eula: true
      version: 1.20.6
      type: PURPUR
      difficulty: normal
      whitelist: "Darkflame72"
      ops: "Darkflame72"
      pvp: true
      motd: Meh
      worldSaveName: World
      viewDistance: 12
      forceReDownload: true
      memory: ""
      jvmXXOpts: "-XX:MaxRAMPercentage=70"
      spigetResources:
        # - Pl3xmap
        - 109697
      serviceType: LoadBalancer
      extraPorts:
        - name: map
          containerPort: 8080
          protocol: TCP
          service:
            enabled: true
            embedded: false
            type: ClusterIP
            port: 8080
          ingress:
            ingressClassName: external
            enabled: true
            hosts:
              - name: &host map.${SECRET_DOMAIN}
                path: /
