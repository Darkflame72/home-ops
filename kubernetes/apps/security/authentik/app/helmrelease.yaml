---
# yaml-language-server: $schema=https://kubernetes-schemas.18b.haus/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chart:
    spec:
      chart: authentik
      version: 2024.12.1
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  interval: 2h
  dependsOn:
    - name: cloudnative-pg
      namespace: database
    - name: dragonfly-operator
      namespace: database
  values:
    authentik:
      postgresql:
        host: postgres16-rw.database.svc.cluster.local
        port: 5432
        read_replicas:
          "0":
            host: postgres16-r.database.svc.cluster.local
            port: 5432
      redis:
        host: dragonfly.database.svc.cluster.local
      email:
        host: smtp-relay.default.svc.cluster.local
        use_tls: false
        port: 25
        from: "Authentik <${NOREPLY_EMAIL}>"
    server:
      ingress:
        enabled: true
        ingressClassName: external
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hosts:
          - &host auth.${SECRET_DOMAIN}
        tls:
          - hosts:
              - *host
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
      resources:
        requests:
          cpu: 30m
          memory: 400Mi
        limits:
          memory: 800Mi
      revisionHistoryLimit: 3
    worker:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
      resources:
        requests:
          cpu: 30m
          memory: 300Mi
        limits:
          memory: 800Mi
      revisionHistoryLimit: 3
    prometheus:
      rules:
        enabled: true
    redis:
      enabled: false
  valuesFrom:
    - kind: Secret
      name: &secret authentik-secret
      valuesKey: SECRET_KEY
      targetPath: authentik.secret_key
    - kind: Secret
      name: *secret
      valuesKey: INIT_POSTGRES_USER
      targetPath: authentik.postgresql.user
    - kind: Secret
      name: *secret
      valuesKey: INIT_POSTGRES_PASS
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: *secret
      valuesKey: INIT_POSTGRES_DBNAME
      targetPath: authentik.postgresql.name
    - kind: Secret
      name: *secret
      valuesKey: INIT_POSTGRES_USER
      targetPath: authentik.postgresql.read_replicas.0.user
    - kind: Secret
      name: *secret
      valuesKey: INIT_POSTGRES_PASS
      targetPath: authentik.postgresql.read_replicas.0.password
    - kind: Secret
      name: *secret
      valuesKey: INIT_POSTGRES_DBNAME
      targetPath: authentik.postgresql.read_replicas.0.name
