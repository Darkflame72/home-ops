machine:
  features:
    kubernetesTalosAPIAccess:
      # Note: roles and namespaces are both flat allow-lists (not paired), so
      # any allowed namespace can request any allowed role.
      allowedKubernetesNamespaces:
        - system-upgrade # tuppr / system-upgrade-controller
        - kube-system # etcd-backup (talos-backup CronJob)
      allowedRoles:
        - os:admin
        - os:etcd:backup
      enabled: true
